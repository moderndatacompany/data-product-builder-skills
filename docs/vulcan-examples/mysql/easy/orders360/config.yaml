vde: false
display_name: Orders360
discoverable: true
version: 0.1.2
alignment: source_aligned
domain: sales
tags:
  - mysql
  - sales
  - analytics
terms:
  - glossary.data_product
  - glossary.analytics_platform
  - glossary.business_intelligence
reference_links:
  - name: Document
    href: https://tmdc-io.github.io/vulcan-book/

name: orders360
tenant: sales
description: Daily sales analytics pipeline tracking order volumes, revenue trends, and customer activity across the e-commerce platform.

# --- Gateway Connection ---
gateways:
  default:
    connection:
      type: mysql
      host: {{ env_var('MYSQL_HOST') }}
      port: {{ env_var('MYSQL_PORT') }}
      user: {{ env_var('MYSQL_USER') }}
      password: {{ env_var('MYSQL_PASSWORD') }}
      database: {{ env_var('MYSQL_DATABASE') }}
    state_connection:
      type: postgres
      host: {{ env_var('STATESTORE_HOST') }}
      port: {{ env_var('STATESTORE_PORT') }}
      database: {{ env_var('STATESTORE_DATABASE') }}
      user: {{ env_var('STATESTORE_USER') }}
      password: {{ env_var('STATESTORE_PASSWORD') }}

default_gateway: default

# --- Model Defaults ---
model_defaults:
  dialect: mysql
  start: 2024-01-01
  cron: '@daily'

# --- Linting Rules ---
linter:
  enabled: true
  rules:
    - ambiguousorinvalidcolumn
    - invalidselectstarexpansion
    - noambiguousprojections

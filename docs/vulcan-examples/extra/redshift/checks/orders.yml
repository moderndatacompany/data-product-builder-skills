checks:
  sales.orders:

    validity:
      - failed rows:
          name: negative_order_amounts
          fail query: |
            SELECT order_id, order_date, customer_id, quantity, unit_price, total_amount
            FROM sales.orders
            WHERE quantity < 0 
               OR unit_price < 0 
               OR discount < 0 
               OR tax < 0 
               OR shipping_cost < 0 
               OR total_amount < 0
          samples limit: 10
          attributes:
            description: "Order amounts cannot be negative"


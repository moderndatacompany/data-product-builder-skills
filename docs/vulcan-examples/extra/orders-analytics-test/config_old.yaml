# ==============================================================================
# Vulcan Data Product Configuration - Postgres E-Commerce Analytics
# ==============================================================================

# Basic Information
name: orders-analytics
display_name: Orders Analytics Platform
tenant: sales
description: Orders Analytics is a centralized data product delivering clean, trusted insights across the full order lifecycle, from creation to fulfillment.

# Classification
tags:
  - e-commerce
  - retail
  - sales_analytics
  - customer_analytics
  - postgres
  - demo

terms:
  - glossary.data_product
  - glossary.analytics_platform
  - glossary.business_intelligence
  - glossary.sales_operations

# Metadata
metadata:
  domain: sales_operations
  use_cases:
    - Daily and weekly sales reporting
    - Customer segmentation and RFM analysis
    - Sales funnel conversion tracking
    - Product performance analytics
    - Regional sales analysis
    - Inventory and shipment tracking
  limitations:
    - Demo dataset with synthetic data (100 customers, 1000 orders)
    - Historical data from November 2025 onwards
    - Data refreshes every 5-15 minutes (configurable by model)
    - ~90% shipment rate (10% orders not shipped in demo data)
  # data_sources:
  #   - Postgres database (localhost:5433)
  #   - Schema: vulcan_demo (bronze layer)
  # sla:
  #   bronze_refresh: "5 minutes for orders/order_items, 15 minutes for dimensions"
  #   silver_refresh: "5-15 minutes depending on model"
  #   gold_refresh: "5 minutes for advanced analytics"
  #   availability: "99.5% uptime target"

# ==============================================================================
# Analytics & Telemetry (Vulcan CloudEvents)
# ==============================================================================
# Enables telemetry for run tracking, lineage, and observability
analytics:
  enabled: false  # Set to true and provide api_key to enable in production
  # base_url: "https://your-dataos-instance.dataos.app/cloudevents/api/v1"
  # api_key: ""  # Required when enabled: true
  # source_name: "postgres_ecommerce"  # Custom source name for CloudEvents
  # enable_search: true  # Enable search functionality for analytics
  # retention_days: 90  # How long to retain analytics data

# ==============================================================================
# Virtual Environment
# ==============================================================================
# Use Python virtual environment only in dev, not in production containers
virtual_environment_mode: dev_only

# ==============================================================================
# Linter Configuration
# ==============================================================================
# Enforces data quality and best practices
linter:
  enabled: true
  warn_rules:
    - RequireGrainForAllModels          # All models should define grain
    - RequireAuditsForAllKindsExceptEmbedded  # Models should have assertions
    - RequireChecksForModels            # Models should have data quality checks
    - PreferAssertions                  # Prefer assertions over audits
    - NoMissingAudits                   # Ensure no models are missing audits/assertions

# ==============================================================================
# Object Store Configuration (Query Service)
# ==============================================================================
# Stores query results and intermediate data
object_store:
  provider: minio
  bucket: warehouse1
  base_path: postgres_ecommerce/queries
  compression: snappy
  presigned_url_expiry_mins: 60  # URLs valid for 1 hour
  credentials:
    endpoint_url: http://localhost:9000
    access_key_id: admin
    secret_access_key: password
    region: us-east-1

# ==============================================================================
# Model Defaults
# ==============================================================================
# Default configuration for all models (can be overridden per model)
model_defaults:
  dialect: postgres
  start: '2025-01-01'  # Default start date for incremental models
  cron: '*/15 * * * *'  # Default: Every 15 minutes (overridden per model)
  # Note: Orders/order_items use */5 minutes, dimensions use */15-20 minutes

# ==============================================================================
# Gateway Configuration
# ==============================================================================
# Database connections and state management
gateways:
  default:
    # Primary data connection (where models are materialized)
    connection:
      type: postgres
      host: localhost
      port: 5433
      user: vulcan
      password: vulcan
      database: warehouse
      # Docs: https://sqlmesh.readthedocs.io/en/latest/integrations/engines/postgres/

    # State management connection (tracks model versions, runs, snapshots)
    # Recommended: Use separate database for state in production
    state_connection:
      type: postgres
      host: localhost
      port: 5431
      user: vulcan
      password: vulcan
      database: statestore
      # For production, consider using dedicated state database:
      # port: 5431
      # database: statestore

    # State schema (stores Vulcan metadata)
    state_schema: postgres_ecommerce_state1

    # Gateway-specific variables (available in models, checks via ${variable_name})
    variables:
      env: development
      region: us-west-2
      data_retention_days: 365
      alert_threshold: 100
      bronze_schema: vulcan_demo
      silver_schema: silver
      gold_schema: gold
      min_customer_count: 50
      min_order_count: 500

# ==============================================================================
# OpenLineage Configuration (Data Lineage Tracking)
# ==============================================================================
# Tracks data lineage, dependencies, and transformations
openlineage:
  enabled: false  # Set to true to enable lineage tracking
  # url: http://127.0.0.1:8000  # Marquez or OpenLineage collector URL
  # timeout_seconds: 10
  # api_key: ""  # Optional API key for authentication

# ==============================================================================
# Transpiler Service (SQL Dialect Translation)
# ==============================================================================
# Enables cross-dialect SQL translation if needed
transpiler:
  base_url: http://127.0.0.1:4000/transpiler
  timeout: 30

# ==============================================================================
# GraphQL API Configuration
# ==============================================================================
# Enables GraphQL API for semantic layer queries
graphql:
  base_url: http://vulcan-graphql:3000
  timeout: 60

# ==============================================================================
# Heimdall Authentication (Enterprise Security)
# ==============================================================================
# Provides authentication and authorization for production deployments
heimdall:
  enabled: false  # Set to true for production with DataOS
  # base_url: "https://your-dataos-instance.dataos.app/heimdall"
  # timeout: 10


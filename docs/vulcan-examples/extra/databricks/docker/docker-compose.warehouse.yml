#########################################################################
# Databricks Warehouse Configuration                                    #
#                                                                       #
# NOTE: Unlike local development setups (e.g., PostgreSQL), Databricks  #
# is a cloud-based data warehouse. No local container is required.      #
#                                                                       #
# This file is a placeholder for consistency with other examples.       #
# The actual Databricks connection is configured in config.yaml and     #
# environment variables passed to the vulcan-api service.               #
#                                                                       #
# Required Environment Variables for Databricks:                        #
#   - DATABRICKS_HOST: Databricks workspace hostname                    #
#   - DATABRICKS_HTTP_PATH: SQL endpoint HTTP path                      #
#   - DATABRICKS_TOKEN: Personal access token                           #
#   - DATABRICKS_CATALOG: Unity Catalog name (e.g., hive_metastore)     #
#########################################################################

networks:
  vulcan:
    external: true

services: {}


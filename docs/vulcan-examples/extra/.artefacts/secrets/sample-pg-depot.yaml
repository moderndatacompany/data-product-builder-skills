name: vulcan-warehouse-postgres-secrets
version: v2alpha
type: secret
description: "Workspace secret for Vulcan warehouse PostgreSQL database connection"
layer: user
secret:
  type: key-value
  data:
    username: colalocal
    password: colalocal

---

version: v2alpha
name: vulcanwarehousepostgres
type: depot
layer: user
spec:
  type: postgresql
  description: "Vulcan warehouse PostgreSQL database depot"
  external: false
  spec:
    host: "cola-local-db.postgres.database.azure.com"
    port: 5432
    database: "postgres"
    subprotocol: "postgresql"
  secrets:
    - id: "system:vulcan-warehouse-postgres-secrets"
      purpose: scan
    - id: "system:vulcan-warehouse-postgres-secrets"
      purpose: query
    - id: "system:vulcan-warehouse-postgres-secrets"
      purpose: rw
services:
  mysql:
    image: mysql:8.4
    container_name: vulcan-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: vulcan
      MYSQL_PASSWORD: vulcan
      MYSQL_DATABASE: warehouse
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uvulcan", "-pvulcan"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:


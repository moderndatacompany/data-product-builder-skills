models:
  sales.orders:
    alias: orders    
    dimensions:
      includes:
        - order_date
        - customer_id
        - product_id
        - quantity
        - discount
        - total_amount
        - order_id
    
    measures:
      total_orders:
        type: count_distinct
        expression: "{orders.order_id}"
      
      total_revenue:
        type: sum
        expression: "{orders.total_amount}"
      
      average_order_value:
        type: avg
        expression: "{orders.total_amount}"
      
      total_quantity_sold:
        type: sum
        expression: "{orders.quantity}"
      
      total_discount_amount:
        type: sum
        expression: "{orders.unit_price} * {orders.quantity} * {orders.discount}"
      
      total_tax_collected:
        type: sum
        expression: "{orders.tax}"
      
      total_shipping_cost:
        type: sum
        expression: "{orders.shipping_cost}"
    
    segments:
      recent_orders:
        expression: |
          {orders.order_date} >= CURRENT_DATE - INTERVAL '7 days'
        
      high_value_orders:
        expression: |
          {orders.total_amount} >= 500
        
      discounted_orders:
        expression: |
          {orders.discount} > 0
    
    joins:
      customers:
        type: many_to_one
        expression: "{orders.customer_id} = {customers.customer_id}"
      
      products:
        type: many_to_one
        expression: "{orders.product_id} = {products.product_id}"

models:
  sales.products:
    alias: products
    
    dimensions:
      includes:
        - product_id
        - product_name
        - category
        - subcategory
        - brand
        - color
        - size
        - price
        - rating
        - stock_quantity
        - discontinued
    
    measures:
      total_products:
        type: count
        expression: "{products.product_id}"
      
      active_products:
        type: count
        expression: "{products.product_id}"
        filters:
          - "{products.discontinued} = FALSE"
    
    segments:
      high_rated_products:
        expression: |
          {products.rating} >= 4.0

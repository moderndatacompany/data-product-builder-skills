version: v1alpha
type: vulcan
name: snowflake-tpch
tags:
  - test
spec:
  runAsUser: "rakeshvishvakarmatmdcio"
  compute: general-purpose-shared
  engine: snowflake
  repo: #enforced full as it is
    url: https://bitbucket.org/rubik_/vulcan-examples
    syncFlags:
      - '--ref=main'
      - '--submodules=off'
    baseDir: vulcan-examples/snowflake-tpch
    secret: system:git-sync # make it optional
  use:
    projection:
      secrets:
        - id: system:snowflake-tpch-secret
          contextAlias: sfc
      projections:
        envVars:
          - key: SNOWFLAKE_USER
            template: "{{ secrets['sfc'].USERNAME | base64_decode }}"
          - key: SNOWFLAKE_PASSWORD
            template: "{{ secrets['sfc'].PASSWORD | base64_decode }}"
          - key: SNOWFLAKE_ACCOUNT
            template: "{{ secrets['sfc'].SNOWFLAKE_ACCOUNT | base64_decode }}"
          - key: SNOWFLAKE_ROLE
            template: "{{ secrets['sfc'].SNOWFLAKE_ROLE | base64_decode }}"
          - key: SNOWFLAKE_WAREHOUSE
            template: "{{ secrets['sfc'].SNOWFLAKE_WAREHOUSE | base64_decode }}"
          - key: SNOWFLAKE_DATABASE
            template: "{{ secrets['sfc'].SNOWFLAKE_DATABASE | base64_decode }}"

  workflow: # enforced
    # Dynamic based on the available cron
    type: schedule #enum json schema
    schedule: #optional
      crons:
      - '*/5 * * * *'
      endOn: '2027-01-01T00:00:00-00:00'
      timezone: 'US/Pacific'
      concurrencyPolicy: Forbid

    logLevel: INFO #default
    resource: #optional
      request:
        cpu: "200m"
        memory: "512Mi"
      limit:
        cpu: "1000m"
        memory: "1Gi"

    #NOTE: - refer document for vulcan commands - https://tmdc-io.github.io/vulcan-book/cli-command/cli/?h=commands
    plan:
      command:
        - vulcan
      arguments:
        - plan
        - --auto-apply
    run:
      command: # enforced
        - vulcan
      arguments: #Optional
        - run

  api:
    replicas: 1
    logLevel: INFO
    resource:
      request:
        cpu: "200m"
        memory: "512Mi"
      limit:
        cpu: "1000m"
        memory: "1Gi"

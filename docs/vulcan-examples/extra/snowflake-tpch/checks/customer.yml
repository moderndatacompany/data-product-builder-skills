checks:
  test_db.vulcan_test_project.customer:
    completeness:
      - missing_count(custkey) = 0:
          name: custkey_not_null
          attributes:
            description: "CUSTOMER.CUSTKEY must be non-null"
      - missing_count(nationkey) = 0:
          name: nationkey_not_null
          attributes:
            description: "CUSTOMER.NATIONKEY must be non-null"
      - missing_count(name) = 0:
          name: customer_name_not_null
          attributes:
            description: "CUSTOMER.NAME must be non-null"
      - row_count > 0:
          name: customer_has_rows
          attributes:
            description: "CUSTOMER should not be empty"

    uniqueness:
      - duplicate_count(custkey) = 0:
          name: custkey_unique
          attributes:
            description: "CUSTOMER.CUSTKEY must be unique"

    validity:
      - failed rows:
          name: customer_nation_fk_exists
          fail query: |
            SELECT c.*
            FROM test_db.vulcan_test_project.customer c
            LEFT JOIN test_db.vulcan_test_project.nation n
              ON c.nationkey = n.nationkey
            WHERE n.nationkey IS NULL
          samples limit: 10
          attributes:
            description: "Every CUSTOMER.NATIONKEY must exist in NATION.NATIONKEY"



services:
  trino:
    image: trinodb/trino:latest
    container_name: vulcan-trino
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./catalog:/etc/trino/catalog
    networks:
      - trino-net
    depends_on:
      iceberg-rest:
        condition: service_started
      mc:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/v1/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Iceberg REST Catalog
  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: vulcan-iceberg-rest
    restart: unless-stopped
    ports:
      - "8181:8181"
    networks:
      - trino-net
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
      - CATALOG_WAREHOUSE=s3://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
    depends_on:
      minio:
        condition: service_healthy

  # MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: vulcan-trino-minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
      - MINIO_DOMAIN=minio
    ports:
      - "9010:9000"
      - "9011:9001"
    networks:
      trino-net:
        aliases:
          - minio
          - warehouse.minio
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO setup - creates warehouse bucket
  mc:
    image: minio/mc:latest
    container_name: vulcan-trino-mc
    networks:
      - trino-net
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set minio http://minio:9000 admin password;
        mc mb --ignore-existing minio/warehouse;
        mc anonymous set public minio/warehouse;
        exit 0;
      "

networks:
  trino-net:
    driver: bridge

volumes:
  minio_data:

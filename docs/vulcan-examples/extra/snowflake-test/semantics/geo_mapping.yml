models:
  LENOVO.USDK.GEO_MAPPING:
    alias: geo_mapping

    dimensions:
      includes:
        - COUNTRY_CODE
        - COUNTRY_NAME
        - REGION
        - REGION_KEY
        - SUB_REGION
        - SUB_REGION_KEY

    measures:
      total_countries:
        type: count_distinct
        expression: "{geo_mapping.COUNTRY_CODE}"
        description: "Total number of countries in mapping"

      total_regions:
        type: count_distinct
        expression: "{geo_mapping.REGION}"
        description: "Total number of unique regions"

      total_sub_regions:
        type: count_distinct
        expression: "{geo_mapping.SUB_REGION}"
        description: "Total number of unique sub-regions"


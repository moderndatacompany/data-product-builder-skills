services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: vulcan-mssql
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "VulcanPass123!"
      MSSQL_PID: "Developer"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "VulcanPass123!" -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      mssql:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/bash -c "
      echo 'Creating warehouse database...';
      /opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P 'VulcanPass123!' -C -Q 'CREATE DATABASE warehouse';
      echo 'Database created successfully';
      "

volumes:
  mssql_data:


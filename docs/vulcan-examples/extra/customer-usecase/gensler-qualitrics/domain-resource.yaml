version: v1alpha
type: vulcan
name: qualtrics-survey-forest
tags:
  - qualtrics
  - survey-analytics
  - employee-engagement
spec:
  runAsUser: "shreyasikarwartmdcio"
  compute: ct-compute
  engine: snowflake
  repo:
    url: https://bitbucket.org/rubik_/vulcan-examples
    syncFlags:
      - '--ref=main'
      - '--submodules=off'
    baseDir: vulcan-examples/customer-usecase/gensler-qualitrics
    secret: ct-onboarding:git-sync
  depots:
    - dataos://snowflakevulcan?purpose=rw
  workflow:
    type: schedule
    schedule:
      crons:
      - '@hourly'  # Daily at 2 AM
      endOn: '2027-01-01T00:00:00-00:00'
      timezone: 'US/Pacific'
      concurrencyPolicy: Forbid

    logLevel: INFO
    resource:
      request:
        cpu: "200m"
        memory: "512Mi"
      limit:
        cpu: "1000m"
        memory: "1Gi"

    migrate:
      command:
        - vulcan
      arguments:
        - migrate
    plan:
      command:
        - vulcan 
      arguments:
        - --log-to-stdout
        - plan
        - --auto-apply
    run:
      command:
        - vulcan
      arguments:
        - --log-to-stdout
        - run

  api:
    replicas: 5
    logLevel: INFO
    resource:
      request:
        cpu: "200m"
        memory: "512Mi"
      limit:
        cpu: "4000m"
        memory: "3Gi"


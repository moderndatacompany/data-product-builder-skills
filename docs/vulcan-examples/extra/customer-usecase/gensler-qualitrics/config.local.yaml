# ==============================================================================
# Connection Notes
# ==============================================================================
# 
# Snowflake Authentication Setup:
# 
# 1. Generate key pair (one-time):
#    openssl genrsa -out snowflake_key.pem 2048
#    openssl rsa -in snowflake_key.pem -pubout -out snowflake_key.pub
#    
# 2. Encrypt private key with passphrase:
#    openssl pkcs8 -topk8 -inform PEM -outform PEM \
#      -in snowflake_key.pem -out snowflake_key.p8 \
#      -v2 aes256cbc -passphrase pass:YOUR_PASSPHRASE
#    
# 3. Assign public key to Snowflake user:
#    ALTER USER SHREYA SET RSA_PUBLIC_KEY='MIIBIjANBg...';
#    
# 4. Grant required privileges:
#    GRANT USAGE ON WAREHOUSE COMPUTE_WH TO USER SHREYA;
#    GRANT USAGE ON DATABASE VULCAN TO USER SHREYA;
#    GRANT CREATE SCHEMA ON DATABASE VULCAN TO USER SHREYA;
#    GRANT USAGE, CREATE TABLE ON SCHEMA VULCAN.QUALTRICS TO USER SHREYA;
#    
# 5. Store credentials securely:
#    export SNOWFLAKE_PRIVATE_KEY_PASSPHRASE="your_passphrase"
#    export SNOWFLAKE_ACCOUNT="EQZOTUQ-JCA67320"
#
# PostgreSQL State Database:
# - Stores Vulcan/SQLMesh state (model versions, runs, snapshots)
# - Connection: localhost:5431/statestore (user: vulcan, password: vulcan)
# - State schema: gensler_qualtrics
#
# Data Loading:
# - Run: python data-movement-nilus/gensler-qualtrics-api/generate_and_load_qualtrics_data.py
# - Creates 10-15 surveys with 30-150 responses each
# - Loads to VULCAN.QUALTRICS schema:
#   * QUALTRICS_RESPONSES_RAW (responseId, values, labels, displayedFields, displayedValues, surveyId, created_at)
#   * QUALTRICS_DEFINITION (survey_id, payload, created_at)
#   * QUALTRICS_RESPONSE_SCHEMA (survey_id, payload, created_at)

transpiler:
  base_url: http://localhost:4000/transpiler  

graphql:
  base_url: http://localhost:3000
  timeout: 60

heimdall:
  enabled: false  # Set to true for production


object_store:
  provider: minio
  bucket: warehouse
  base_path: queries
  compression: snappy
  presigned_url_expiry_mins: 60  # URLs valid for 1 hour
  credentials:
    endpoint_url: http://127.0.0.1:9000
    access_key_id: admin
    secret_access_key: password
    region: us-east-1

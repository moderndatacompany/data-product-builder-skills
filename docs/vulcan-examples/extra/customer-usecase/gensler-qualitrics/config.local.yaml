# ==============================================================================
# Vulcan Data Product Configuration - Gensler Qualtrics
# ==============================================================================

# Basic Information
name: gensler-qualitrics
display_name: Gensler Qualtrics Survey Analytics
tenant: marketing
description: |
  Gensler Qualtrics Survey Analytics is a data product that processes survey responses, 
  definitions, and schemas from Qualtrics surveys loaded into Snowflake. It provides 
  structured analytics on employee engagement, customer satisfaction, and workspace 
  planning surveys.

# Classification
tags:
  - qualtrics
  - surveys
  - analytics
  - snowflake
  - gensler
  - employee_engagement
  - workspace_planning

terms:
  - glossary.data_product
  - glossary.analytics_platform
  - glossary.survey_data

# Metadata
metadata:
  domain: marketing
  use_cases:
    - Employee engagement survey analysis
    - Customer satisfaction tracking
    - Office space planning insights
    - Department feedback aggregation
    - Survey response rate tracking
    - Multi-survey response analytics
  limitations:
    - Synthetic/mock survey data
    - Requires Snowflake key-pair authentication
    - Data refreshed via external Python script
    - JSON fields stored as strings (requires parsing in models)


# ==============================================================================
# Analytics & Telemetry (Vulcan CloudEvents)
# ==============================================================================
analytics:
  enabled: false  # Set to true and provide api_key to enable in production
  # base_url: "https://your-dataos-instance.dataos.app/cloudevents/api/v1"
  # api_key: ""  # Required when enabled: true
  # source_name: "gensler_qualtrics_snowflake"
  # enable_search: true
  # retention_days: 90

# ==============================================================================
# Virtual Environment
# ==============================================================================
# Use Python virtual environment only in dev, not in production containers
# virtual_environment_mode: dev_only

# ==============================================================================
# Linter Configuration
# ==============================================================================
# linter:
#   enabled: true
#   warn_rules:
#     - RequireGrainForAllModels          # All models should define grain
#     - RequireAuditsForAllKindsExceptEmbedded  # Models should have assertions
#     - RequireChecksForModels            # Models should have data quality checks
#     - PreferAssertions                  # Prefer assertions over audits
#     - NoMissingAudits                   # Ensure no models are missing audits/assertions

# ==============================================================================
# Model Defaults
# ==============================================================================
model_defaults:
  dialect: snowflake
  start: '2025-01-01'  # Default start date for incremental models
  cron: '*/5 * * * *'  # Default: Every 5 minutes

# ==============================================================================
# Transpiler Service (SQL Dialect Translation)
# ==============================================================================
# transpiler:
#   base_url: "http://vulcan-transpiler:4000/transpiler"
#   timeout: 30

# ==============================================================================
# Gateway Configuration
# ==============================================================================
gateways:
  default:
    # Primary Snowflake connection (where models are materialized)
    connection:
      type: snowflake
      account: EQZOTUQ-JCA67320
      user: SHREYA
      warehouse: COMPUTE_WH
      database: VULCAN
      role: ACCOUNTADMIN
      authenticator: snowflake_jwt
      private_key_path: .secrets/snowflake_private_key.p8
      private_key_passphrase: shreya

    # PostgreSQL state management connection (tracks model versions, runs, snapshots)
    state_connection:
      type: postgres
      host: localhost
      port: 5431
      user: vulcan
      password: vulcan
      database: statestore

    # State schema (stores Vulcan metadata)
    state_schema: gensler_qualtrics1

    # Gateway-specific variables (available in models, checks via ${variable_name})
    variables:
      env: development
      region: us-east-1
      data_retention_days: 365
      # Source schemas/tables
      raw_schema: QUALTRICS
      raw_responses_table: QUALTRICS_RESPONSES_RAW
      raw_definition_table: QUALTRICS_DEFINITION
      raw_schema_table: QUALTRICS_RESPONSE_SCHEMA
      # Target schemas
      bronze_schema: QUALTRICS_BRONZE
      silver_schema: QUALTRICS_SILVER
      gold_schema: QUALTRICS_GOLD
      # Data quality thresholds
      min_response_count: 30
      min_survey_count: 10
      max_response_age_days: 365


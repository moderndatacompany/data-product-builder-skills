# ==============================================================================
# Vulcan Data Product Configuration - Gensler Qualtrics Survey Analytics
# ==============================================================================

# Basic Information
name: qualtrics-survey-nebula
display_name: Qualtrics Survey Analytics
tenant: engineering
description: Qualtrics Survey Analytics delivers comprehensive survey response analysis through Qualtrics integration, providing question-level insights, respondent metrics, survey health monitoring, and data quality assessment for employee engagement, customer satisfaction, and workspace planning decision support.

# Classification
tags:
  - qualtrics
  - survey-analytics
  - customer-satisfaction
  - employee-engagement


terms:
  - data_product
  - survey_dimension
  - response_fact
  - analytics_platform
  - survey_data
  - business_intelligence

# Domain
domain: marketing_analytics

# ==============================================================================
# Analytics & Telemetry (Vulcan CloudEvents)
# ==============================================================================
# Enables telemetry for run tracking, lineage, and observability
# analytics:
#   enabled: false  # Set to true and provide api_key to enable in production
  # base_url: "https://your-dataos-instance.dataos.app/cloudevents/api/v1"
  # api_key: ""  # Required when enabled: true
  # source_name: "gensler_qualtrics"  # Custom source name for CloudEvents
  # enable_search: true  # Enable search functionality for analytics
  # retention_days: 90  # How long to retain analytics data

# ==============================================================================
# Virtual Environment
# ==============================================================================
# Use Python virtual environment only in dev, not in production containers
#virtual_environment_mode: dev_only

# ==============================================================================
# Linter Configuration
# ==============================================================================
# Enforces data quality and best practices
linter:
  enabled: false
  warn_rules:
    - preferassertions  # Yellow warning, doesn't block
    - nomissingaudits

# ==============================================================================
# Object Store Configuration (Query Service)
# ==============================================================================
# Stores query results and intermediate data
# object_store:
#   provider: minio
#   bucket: warehouse
#   base_path: gensler_qualtrics/queries
#   compression: snappy
#   presigned_url_expiry_mins: 60  # URLs valid for 1 hour
#   credentials:
#     endpoint_url: http://localhost:9000
#     access_key_id: admin
#     secret_access_key: password
#     region: us-east-1

# ==============================================================================
# Model Defaults
# ==============================================================================
# Default configuration for all models (can be overridden per model)
model_defaults:
  dialect: snowflake
  start: '2024-01-01'  # Default start date for incremental models
  cron: '@hourly'  # Daily refresh for all models

# ==============================================================================
# Gateway Configuration
# ==============================================================================
# Database connections and state management
gateways:
  default:
    # Primary data connection (where models are materialized)
    connection:
      type: depot
      address: dataos://snowflakevulcan

    # State schema (stores Vulcan metadata)
    # state_schema: gensler_qualtrics_state

    # Gateway-specific variables (available in models, checks via ${variable_name})
    # variables:
    #   env: development
    #   region: us-west-2
    #   data_retention_days: 365
    #   alert_threshold: 100

# ==============================================================================
# OpenLineage Configuration (Data Lineage Tracking)
# ==============================================================================
# openlineage:
#   enabled: true
#   url: https://forest-020226.dataos.cloud/hera
#   timeout_seconds: 30
#   api_key: cG9zaXRpdmVseV9zYWZlX2h1c2t5XzIwMjYwMjA1LjFmNzI0MTAwLWRjNWUtNDk5Yi1iNDlmLTFkYWU0NzVlNzE4MDhjN2QxZDA4YTE2MDZiNjc1NzViMTBhY2M1ZjRhZWIx

# ==============================================================================
# Transpiler Service (SQL Dialect Translation)
# ==============================================================================
# Enables cross-dialect SQL translation if needed
# transpiler:
#   base_url: http://127.0.0.1:4000/transpiler
#   timeout: 30

# ==============================================================================
# GraphQL API Configuration
# ==============================================================================
# Enables GraphQL API for semantic layer queries
# graphql:
#   base_url: http://vulcan-graphql:3000
#   timeout: 60

# ==============================================================================
# Heimdall Authentication (Enterprise Security)
# ==============================================================================
# Provides authentication and authorization for production deployments
# heimdall:
#   enabled: false  # Set to true for production with DataOS
#   # base_url: "https://your-dataos-instance.dataos.app/heimdall"
#   # timeout: 10

# ==============================================================================
# Notification Configuration
# ==============================================================================
# Send notifications for important events (runs, failures, migrations)
notification_targets:
  - type: console
    notify_on:
      - apply_start
      - apply_end
      - apply_failure
      - run_start
      - run_end
      - run_failure
      - audit_failure
      - check_start
      - check_end
      - check_failure
      - migration_start
      - migration_end
      - migration_failure
      - plan_change

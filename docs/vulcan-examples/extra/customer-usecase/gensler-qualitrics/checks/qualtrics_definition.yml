checks:
  GENSLER.RAW.QUALTRICS_DEFINITION:
    completeness:
      - missing_count(SURVEY_ID) = 0:
          name: no_missing_survey_ids
          attributes:
            description: "All survey definitions must have a survey ID"
      
      - missing_count(DEFINITION_ID) = 0:
          name: no_missing_definition_ids
          attributes:
            description: "All records must have a unique identifier"
      
      - missing_count(PARSED_JSON) = 0:
          name: no_missing_parsed_json
          attributes:
            description: "All survey definitions must have parsed JSON data"
      
      - row_count > 0:
          name: has_survey_definitions
          attributes:
            description: "At least one survey definition must exist"
    
    validity:
      - failed rows:
          name: invalid_survey_ids
          fail query: |
            SELECT SURVEY_ID, EXTRACTED_AT, LOAD_ID
            FROM GENSLER.RAW.QUALTRICS_DEFINITION
            WHERE SURVEY_ID IS NULL OR SURVEY_ID = '' OR LENGTH(SURVEY_ID) < 10
          samples limit: 10
          attributes:
            description: "Survey IDs must be valid Qualtrics format (at least 10 characters)"
      
      - failed rows:
          name: invalid_json_structure
          fail query: |
            SELECT SURVEY_ID, DEFINITION_ID, EXTRACTED_AT
            FROM GENSLER.RAW.QUALTRICS_DEFINITION
            WHERE PARSED_JSON:result IS NULL 
               OR PARSED_JSON:result.SurveyID IS NULL
          samples limit: 10
          attributes:
            description: "Parsed JSON must contain valid result structure with SurveyID"
      
      - failed rows:
          name: future_extraction_dates
          fail query: |
            SELECT SURVEY_ID, EXTRACTED_AT, LOAD_ID
            FROM GENSLER.RAW.QUALTRICS_DEFINITION
            WHERE EXTRACTED_AT > CURRENT_TIMESTAMP()
          samples limit: 10
          attributes:
            description: "Extraction timestamp cannot be in the future"
    
    uniqueness:
      - duplicate_count(SURVEY_ID) = 0:
          name: unique_survey_ids
          attributes:
            description: "Survey IDs must be unique per load"
      
      - duplicate_count(DEFINITION_ID) = 0:
          name: unique_definition_ids
          attributes:
            description: "Definition IDs must be globally unique"
    
    timeliness:
      - row_count > 0:
          name: recent_data_exists
          attributes:
            description: "Survey definition data should exist"


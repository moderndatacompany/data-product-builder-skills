# ============================================================================
# SEMANTIC MODEL: Sales (Aligned with dp_web_heartbeat/model/tables/sales.yaml)
# ============================================================================
# Contains ALL 30+ measures from the reference artifact
# ============================================================================

models:
  web_analytics_gold.SALES:
    alias: sales
    # description: "Table containing information about sales"
    
    dimensions:
      excludes: []
    
    measures:
      # ==================== CUSTOMER COUNTS ====================
      total_purchased_customers:
        type: number
        expression: "COUNT(DISTINCT {sales.CUSTOMER_NO})"
        description: "total no of customers who had made purchase."
      
      # ==================== INVOICE COUNTS ====================
      total_invoices:
        type: number
        expression: "COUNT(DISTINCT CASE WHEN {sales.POSTING_DATE} >= {sales.PROOF_INVOICE_DATE_FIRST} THEN {sales.INVOICE_NO} END)"
        description: "Total Invoices Generated."
      
      total_proof_invoices:
        type: number
        expression: "COUNT(DISTINCT CASE WHEN {sales.SOURCE} = 'Proof' THEN {sales.INVOICE_NO} ELSE NULL END)"
        description: "Total Proof Invoices Generated."
      
      total_non_proof_invoices:
        type: number
        expression: "COUNT(DISTINCT CASE WHEN {sales.SOURCE} = 'Non-proof' AND {sales.POSTING_DATE} >= {sales.PROOF_INVOICE_DATE_FIRST} THEN {sales.INVOICE_NO} ELSE NULL END)"
        description: "Total Non Proof Invoices Generated."
      
      # ==================== REVENUE ====================
      total_revenue:
        type: number
        expression: "SUM(CASE WHEN {sales.POSTING_DATE} >= {sales.PROOF_INVOICE_DATE_FIRST} THEN {sales.EXT_NET} ELSE 0 END)"
        description: "Calculates the total revenue generated."
      
      proof_revenue:
        type: number
        expression: "SUM(CASE WHEN {sales.SOURCE} = 'Proof' THEN {sales.EXT_NET} ELSE 0 END)"
        description: "Overall revenue generated by a business on 'Proof'"
      
      non_proof_revenue:
        type: number
        expression: "SUM(CASE WHEN {sales.SOURCE} = 'Non-proof' AND {sales.POSTING_DATE} >= {sales.PROOF_INVOICE_DATE_FIRST} THEN {sales.EXT_NET} ELSE 0 END)"
        description: "Overall revenue generated by a business on 'Non-Proof'"
      
      proof_average_invoice_value:
        type: number
        expression: "ROUND(SUM(CASE WHEN {sales.SOURCE} = 'Proof' THEN {sales.EXT_NET} ELSE 0 END) / NULLIF(COUNT(DISTINCT CASE WHEN {sales.SOURCE} = 'Proof' THEN {sales.INVOICE_NO} ELSE NULL END), 0), 2)"
        description: "Average invoice value of customer from proof source."
      
      # ==================== R12 (ROLLING 12 MONTHS) ====================
      r12_total_revenue:
        type: number
        expression: "SUM(CASE WHEN CAST({sales.POSTING_DATE} AS DATE) >= CURRENT_DATE - INTERVAL 12 MONTH AND {sales.POSTING_DATE} >= {sales.PROOF_INVOICE_DATE_FIRST} THEN {sales.EXT_NET} ELSE 0 END)"
        description: "Calculates the recent 12 months of total revenue generated."
      
      r12_proof_revenue:
        type: number
        expression: "SUM(CASE WHEN {sales.SOURCE} = 'Proof' AND CAST({sales.POSTING_DATE} AS DATE) >= CURRENT_DATE - INTERVAL 12 MONTH THEN {sales.EXT_NET} ELSE 0 END)"
        description: "Recent 12 month revenue generated by a business on 'Proof'"
      
      r12_non_proof_revenue:
        type: number
        expression: "SUM(CASE WHEN {sales.SOURCE} = 'Non-proof' AND {sales.POSTING_DATE} >= {sales.PROOF_INVOICE_DATE_FIRST} AND CAST({sales.POSTING_DATE} AS DATE) >= CURRENT_DATE - INTERVAL 12 MONTH THEN {sales.EXT_NET} ELSE 0 END)"
        description: "Recent 12 month revenue generated by a business on 'Non-Proof'"
      
      # ==================== LAST 30 DAYS ====================
      last30days_total_revenue:
        type: number
        expression: "SUM(CASE WHEN CAST({sales.POSTING_DATE} AS DATE) >= CURRENT_DATE - INTERVAL 30 DAY AND {sales.POSTING_DATE} >= {sales.PROOF_INVOICE_DATE_FIRST} THEN {sales.EXT_NET} ELSE 0 END)"
        description: "Calculates the recent 30 days of total revenue generated."
      
      last30days_proof_revenue:
        type: number
        expression: "SUM(CASE WHEN {sales.SOURCE} = 'Proof' AND CAST({sales.POSTING_DATE} AS DATE) >= CURRENT_DATE - INTERVAL 30 DAY THEN {sales.EXT_NET} ELSE 0 END)"
        description: "Recent 30 days revenue generated by a business on 'Proof'"
      
      last30days_non_proof_revenue:
        type: number
        expression: "SUM(CASE WHEN {sales.SOURCE} = 'Non-proof' AND {sales.POSTING_DATE} >= {sales.PROOF_INVOICE_DATE_FIRST} AND CAST({sales.POSTING_DATE} AS DATE) >= CURRENT_DATE - INTERVAL 30 DAY THEN {sales.EXT_NET} ELSE 0 END)"
        description: "Recent 30 days revenue generated by a business on 'Non-Proof'"
      
      # ==================== PREVIOUS 30 DAYS ====================
      prev30days_total_revenue:
        type: number
        expression: "SUM(CASE WHEN CAST({sales.POSTING_DATE} AS DATE) >= CURRENT_DATE - INTERVAL 60 DAY AND CAST({sales.POSTING_DATE} AS DATE) < CURRENT_DATE - INTERVAL 30 DAY AND {sales.POSTING_DATE} >= {sales.PROOF_INVOICE_DATE_FIRST} THEN {sales.EXT_NET} ELSE 0 END)"
        description: "Calculates the previous 30 days total revenue generated."
      
      prev30days_proof_revenue:
        type: number
        expression: "SUM(CASE WHEN {sales.SOURCE} = 'Proof' AND CAST({sales.POSTING_DATE} AS DATE) >= CURRENT_DATE - INTERVAL 60 DAY AND CAST({sales.POSTING_DATE} AS DATE) < CURRENT_DATE - INTERVAL 30 DAY THEN {sales.EXT_NET} ELSE 0 END)"
        description: "Calculates the previous 30 days revenue generated by a business on 'Proof'"
      
      prev30days_non_proof_revenue:
        type: number
        expression: "SUM(CASE WHEN {sales.SOURCE} = 'Non-proof' AND CAST({sales.POSTING_DATE} AS DATE) >= CURRENT_DATE - INTERVAL 60 DAY AND CAST({sales.POSTING_DATE} AS DATE) < CURRENT_DATE - INTERVAL 30 DAY AND {sales.POSTING_DATE} >= {sales.PROOF_INVOICE_DATE_FIRST} THEN {sales.EXT_NET} ELSE 0 END)"
        description: "Calculates the previous 30 days revenue generated by a business on 'Non-Proof'"
      
      # ==================== R12 UNTIL PREVIOUS 30 DAYS ====================
      r12_total_revenue_until_prev_30days:
        type: number
        expression: "SUM(CASE WHEN CAST({sales.POSTING_DATE} AS DATE) >= CURRENT_DATE - INTERVAL 13 MONTH AND {sales.POSTING_DATE} >= {sales.PROOF_INVOICE_DATE_FIRST} AND CAST({sales.POSTING_DATE} AS DATE) < CURRENT_DATE - INTERVAL 1 MONTH THEN {sales.EXT_NET} ELSE 0 END)"
        description: "Calculates the recent 12 months until previous month of total revenue generated."
      
      r12_proof_revenue_until_prev_30days:
        type: number
        expression: "SUM(CASE WHEN {sales.SOURCE} = 'Proof' AND CAST({sales.POSTING_DATE} AS DATE) >= CURRENT_DATE - INTERVAL 13 MONTH AND CAST({sales.POSTING_DATE} AS DATE) < CURRENT_DATE - INTERVAL 1 MONTH THEN {sales.EXT_NET} ELSE 0 END)"
        description: "Recent 12 month revenue until previous month generated by a business on 'Proof'"
      
      r12_non_proof_revenue_until_prev_30days:
        type: number
        expression: "SUM(CASE WHEN {sales.SOURCE} = 'Non-proof' AND {sales.POSTING_DATE} >= {sales.PROOF_INVOICE_DATE_FIRST} AND CAST({sales.POSTING_DATE} AS DATE) >= CURRENT_DATE - INTERVAL 13 MONTH AND CAST({sales.POSTING_DATE} AS DATE) < CURRENT_DATE - INTERVAL 1 MONTH THEN {sales.EXT_NET} ELSE 0 END)"
        description: "Recent 12 month revenue until previous month generated by a business on 'Non-Proof'"
      
      # ==================== WALLET SHARE ====================
      wallet_share:
        type: number
        expression: "ROUND(SUM(CASE WHEN {sales.SOURCE} = 'Proof' THEN {sales.EXT_NET} ELSE 0 END) / CAST(NULLIF(SUM(CASE WHEN {sales.POSTING_DATE} >= {sales.PROOF_INVOICE_DATE_FIRST} THEN {sales.EXT_NET} ELSE 0 END), 0) AS DOUBLE), 2)"
        description: "It retrieves the share of wallet in percentage."
      
      # ==================== PER ACCOUNT METRICS ====================
      rev_per_account_non_proof:
        type: number
        expression: "ROUND(SUM(CASE WHEN {sales.SOURCE} = 'Non-proof' AND {sales.POSTING_DATE} >= {sales.PROOF_INVOICE_DATE_FIRST} THEN {sales.EXT_NET} ELSE 0 END) / NULLIF(COUNT(DISTINCT {sales.CUSTOMER_NO}), 0), 2)"
        description: "Calculates avg of non-proof revenue per account"
      
      rev_per_account_proof:
        type: number
        expression: "ROUND(SUM(CASE WHEN {sales.SOURCE} = 'Proof' THEN {sales.EXT_NET} ELSE 0 END) / NULLIF(COUNT(DISTINCT {sales.CUSTOMER_NO}), 0), 2)"
        description: "Calculates avg of proof revenue per account"
      
      invoices_per_account_non_proof:
        type: number
        expression: "ROUND(COUNT(DISTINCT CASE WHEN {sales.SOURCE} = 'Non-proof' AND {sales.POSTING_DATE} >= {sales.PROOF_INVOICE_DATE_FIRST} THEN {sales.INVOICE_NO} ELSE NULL END) * 1.00 / NULLIF(COUNT(DISTINCT {sales.CUSTOMER_NO}), 0), 2)"
        description: "Calculates avg of non-proof invoices per account"
      
      invoices_per_account_proof:
        type: number
        expression: "ROUND(COUNT(DISTINCT CASE WHEN {sales.SOURCE} = 'Proof' THEN {sales.INVOICE_NO} ELSE NULL END) * 1.00 / NULLIF(COUNT(DISTINCT {sales.CUSTOMER_NO}), 0), 2)"
        description: "Calculates avg of proof invoices per account"
    
    segments:
      is_proof:
        expression: "{sales.SOURCE} = 'Proof'"
        description: "Proof channel sales"
      
      is_non_proof:
        expression: "{sales.SOURCE} = 'Non-proof'"
        description: "Non-Proof channel sales"

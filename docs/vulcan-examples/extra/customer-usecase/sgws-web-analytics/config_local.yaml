# ==============================================================================
# Vulcan Data Product Configuration - SGWS Web Analytics (Snowflake)
# ==============================================================================

# Basic Information
name: sgws-web-analytics
display_name: SGWS Web Analytics
tenant: marketing
description: SGWS Web Analytics delivers comprehensive web and e-commerce insights through Adobe Analytics integration and sales data, providing customer behavior analysis, order tracking, and product performance metrics for data-driven decision making.

# ==============================================================================
# Model Defaults
# ==============================================================================
model_defaults:
  dialect: snowflake
  start: 2024-01-01
  cron: '@daily'

# ==============================================================================
# Gateway Configuration
# ==============================================================================
gateways:
  default:
    connection:
      type: snowflake
      account: {{ env_var('SNOWFLAKE_ACCOUNT') }}
      user: {{ env_var('SNOWFLAKE_USER') }}
      # Using key-pair authentication instead of password
      authenticator: SNOWFLAKE_JWT
      private_key_path: {{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH') }}
      private_key_passphrase: {{ env_var('SNOWFLAKE_PRIVATE_KEY_PASSPHRASE') }}
      warehouse: {{ env_var('SNOWFLAKE_WAREHOUSE') }}
      database: {{ env_var('SNOWFLAKE_DATABASE') }}
      role: {{ env_var('SNOWFLAKE_ROLE') }}
    
    # State management (local Postgres for development)
    state_connection:
      type: postgres
      host: {{ env_var('STATESTORE_HOST') }}
      port: {{ env_var('STATESTORE_PORT') }}
      database: {{ env_var('STATESTORE_DATABASE') }}
      user: {{ env_var('STATESTORE_USER') }}
      password: {{ env_var('STATESTORE_PASSWORD') }}

default_gateway: default


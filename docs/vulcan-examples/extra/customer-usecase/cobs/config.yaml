# ==============================================================================
# Vulcan Data Product Configuration - COBS (Snowflake)
# ==============================================================================

# Basic Information
name: cobs-analytics-forest
display_name: COBS - Customer Order Behavior Segmentation
tenant: ct-onboarding
description: COBS (Customer Order Behavior Segmentation) is a production-grade behavioral analytics data product that transforms raw transactional data into actionable customer intelligence. Using RFM-style analytics combined with proof product adoption metrics, COBS segments customers into 8 distinct behavioral cohorts (Outperformers, Web Loyalist, Promising, Newly Activated, Novice, Infrequent, Lapsed, Lost) with early-warning detection for at-risk accounts.

# Classification
tags:
  - cobs
  - customer_segmentation
  - behavioral_analytics
  - rfm_analysis
  - sales_analytics
  - customer_analytics
  - snowflake
  - cloud-warehouse

terms:
  - glossary.data_product
  - glossary.customer_segmentation
  - glossary.behavioral_analytics
  - glossary.rfm_model
  - glossary.sales_operations

# Domain
domain: sales_operations

# ==============================================================================
# Analytics & Telemetry (Vulcan CloudEvents)
# ==============================================================================
analytics:
  enabled: false
  # base_url: "https://your-dataos-instance.dataos.app/cloudevents/api/v1"
  # api_key: ""
  # source_name: "cobs_analytics"

# ==============================================================================
# Virtual Environment
# ==============================================================================
# virtual_environment_mode: dev_only

# ==============================================================================
# Linter Configuration
# ==============================================================================
linter:
  enabled: false
  warn_rules:
    - preferassertions
    - nomissingaudits


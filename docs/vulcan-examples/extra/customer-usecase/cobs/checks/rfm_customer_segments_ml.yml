    completeness:
      - failed rows:
          name: required_fields_not_null
          fail query: |
            SELECT 
              ACCOUNT_ID,
              DATE,
              SALES_BUCKET,
              SEGMENT
            FROM cobs.rfm_customer_segments_ml
            WHERE ACCOUNT_ID IS NULL
               OR DATE IS NULL
               OR SALES_BUCKET IS NULL
               OR segment IS NULL
          samples limit: 10
          attributes:
            description: "Critical fields (Account_ID, date, Sales_Bucket, segment) must not be null"
      - failed rows:
          name: rfm_scores_completeness
          fail query: |
            SELECT 
              ACCOUNT_ID,
              DATE,
              SEGMENT,
              RECENCY_SCORE,
              FREQUENCY_SCORE,
              WALLET_SCORE
            FROM cobs.rfm_customer_segments_ml
            WHERE segment NOT IN ('Lapsed', 'Newly Activated')
              AND (RECENCY_SCORE IS NULL 
                OR FREQUENCY_SCORE IS NULL 
                OR WALLET_SCORE IS NULL)
          samples limit: 10
          attributes:
            description: "RFM scores should not be null for non-Lapsed/Newly Activated segments"


    consistency:
      - failed rows:
          name: calculated_non_proof_revenue_matches
          fail query: |
            SELECT 
              ACCOUNT_ID,
              DATE,
              R12_TOTAL_REV,
              R12_PROOF_REV,
              R12_NON_PROOF_REV,
              (R12_TOTAL_REV - R12_PROOF_REV) AS expected_non_proof,
              ABS(R12_NON_PROOF_REV - (R12_TOTAL_REV - R12_PROOF_REV)) AS difference
            FROM cobs.rfm_customer_segments_ml
            WHERE ABS(R12_NON_PROOF_REV - (R12_TOTAL_REV - R12_PROOF_REV)) > 0.01
          samples limit: 10
          attributes:
            description: "Non-proof revenue should equal total revenue minus proof revenue"

      
      - failed rows:
          name: calculated_non_proof_invoices_matches
          fail query: |
            SELECT 
              ACCOUNT_ID,
              DATE,
              R12_TOTAL_INVOICES,
              R12_PROOF_INVOICES,
              R12_NON_PROOF_INVOICES,
              (R12_TOTAL_INVOICES - R12_PROOF_INVOICES) AS expected_non_proof
            FROM cobs.rfm_customer_segments_ml
            WHERE R12_NON_PROOF_INVOICES != (R12_TOTAL_INVOICES - R12_PROOF_INVOICES)
          samples limit: 10
          attributes:
            description: "Non-proof invoices should equal total invoices minus proof invoices"



# ==============================================================================
# Vulcan Data Product Configuration - COBS (Snowflake) - Local / Dev
# ==============================================================================
# Use with: vulcan plan --config config_local.yaml (or set VULCAN_CONFIG_PATH)

# Basic Information
name: cobs-analytics
display_name: COBS - Customer Order Behavior Segmentation
tenant: ct-onboarding
description: COBS (Customer Order Behavior Segmentation) is a production-grade behavioral analytics data product that transforms raw transactional data into actionable customer intelligence. Using RFM-style analytics combined with proof product adoption metrics, COBS segments customers into 8 distinct behavioral cohorts with early-warning detection for at-risk accounts.

# ==============================================================================
# Model Defaults
# ==============================================================================
model_defaults:
  dialect: snowflake
  start: '2025-01-01'
  cron: '@daily'

# ==============================================================================
# Gateway Configuration (local: direct Snowflake + local statestore)
# ==============================================================================
gateways:
  default:
    connection:
      type: snowflake
      account: {{ env_var('SNOWFLAKE_ACCOUNT') }}
      user: {{ env_var('SNOWFLAKE_USER') }}
      authenticator: SNOWFLAKE_JWT
      private_key_path: {{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH') }}
      private_key_passphrase: {{ env_var('SNOWFLAKE_PRIVATE_KEY_PASSPHRASE') }}
      warehouse: {{ env_var('SNOWFLAKE_WAREHOUSE') }}
      database: {{ env_var('SNOWFLAKE_DATABASE') }}
      role: {{ env_var('SNOWFLAKE_ROLE') }}

    state_connection:
      type: postgres
      host: {{ env_var('STATESTORE_HOST') }}
      port: {{ env_var('STATESTORE_PORT') }}
      database: {{ env_var('STATESTORE_DATABASE') }}
      user: {{ env_var('STATESTORE_USER') }}
      password: {{ env_var('STATESTORE_PASSWORD') }}
    state_schema: new3

default_gateway: default

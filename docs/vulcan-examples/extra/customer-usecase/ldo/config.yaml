name: lenovo-device-op
display_name: Lenovo Device Op
tenant: ct-onboarding
description: Lenovo Device Operations (LDO) is a comprehensive data product delivering device lifecycle management, operations monitoring, and license management insights. It processes device telemetry, warranty information, system updates, license consumption, and device health metrics to provide actionable insights for IT operations, device fleet management, and compliance tracking.

tags:
  - snowflake
  - device_operations
  - device_lifecycle
  - license_management
  - device_health
  - lenovo
  - warranty_tracking
  - system_updates
  - device_monitoring
  - fleet_management
  - cdc

terms:
  - data_product
  - device_operations
  - device_lifecycle
  - license_management
  - warranty_tracking
  - device_health
  - fleet_management
  - compliance_tracking

domain: it_operations
# analytics:
#   enabled: false

model_defaults:
  dialect: snowflake
  start: '2025-01-01'
  cron: '@daily'

gateways:
  default:
    connection:
      type: depot
      address: dataos://snowflakevulcan


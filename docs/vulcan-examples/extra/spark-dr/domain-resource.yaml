version: v1alpha
type: vulcan
name: sdp02
description: Spark + Iceberg example with MinIO object storage and PostgreSQL state store.
tags:
  - spark
  - iceberg
  - analytics
  - lakehouse
spec:
  runAsUser: "shreyasikarwartmdcio"
  compute: pacific
  engine: spark
  repo:
    url: https://bitbucket.org/rubik_/vulcan-examples
    syncFlags:
      - '--ref=main'
      - '--submodules=off'
    baseDir: vulcan-examples/extra/spark-dr
    secret: system:git-sync
  depots:
    - dataos://avulcanawslh?purpose=rw
  workflow:
    schedule:
      crons:
        - '*/5 * * * *'
      endOn: '2027-01-01T00:00:00-00:00'
      timezone: 'US/Pacific'
      concurrencyPolicy: Forbid
    logLevel: INFO
    resource:
      request:
        cpu: "200m"
        memory: "512Mi"
      limit:
        cpu: "1000m"
        memory: "1Gi"
    plan:
      command:
        - vulcan
      arguments:
        - plan
        - --auto-apply
    run:
      command:
        - vulcan
      arguments:
        - run
  api:
    replicas: 1
    logLevel: INFO
    resource:
      request:
        cpu: "200m"
        memory: "512Mi"
      limit:
        cpu: "1000m"
        memory: "1Gi"

models:
  sales.orders:
    alias: orders    
    dimensions:
      includes:
        - order_date
        - customer_id
        - order_id
        - order_status
        - order_channel
        - currency
        - shipping_country
        - shipping_state
        - shipping_city
        - shipping_postal_code
        - payment_status
        - subtotal_amount
        - discount_amount
        - tax_amount
        - shipping_cost
        - total_amount
    
    measures:
      total_orders:
        type: count_distinct
        expression: "{orders.order_id}"
      
      total_revenue:
        type: sum
        expression: "{orders.total_amount}"
      
      average_order_value:
        type: avg
        expression: "{orders.total_amount}"

      total_subtotal_amount:
        type: sum
        expression: "{orders.subtotal_amount}"

      total_discount_amount:
        type: sum
        expression: "{orders.discount_amount}"

      total_tax_collected:
        type: sum
        expression: "{orders.tax_amount}"
      
      total_shipping_cost:
        type: sum
        expression: "{orders.shipping_cost}"
    
    segments:
      recent_orders:
        expression: |
          {orders.order_date} >= CURRENT_DATE - INTERVAL '7 days'
        
      high_value_orders:
        expression: |
          {orders.total_amount} >= 200
        
      discounted_orders:
        expression: |
          {orders.discount_amount} > 0
    
    joins:
      customers:
        type: many_to_one
        expression: "{orders.customer_id} = {customers.customer_id}"

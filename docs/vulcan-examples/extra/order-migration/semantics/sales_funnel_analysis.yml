models:
  aggregated.sales_funnel_analysis:
    alias: sales_funnel
    
    measures:
      total_registered_customers:
        type: sum
        expression: "{sales_funnel.stage_1_registered_customers}"
        description: "Total registered customers across all regions"
        tags:
          - funnel
          - stage1
          - registration
        terms:
          - funnel.registered
          - customer.registration_count
      
      total_ordering_customers:
        type: sum
        expression: "{sales_funnel.stage_2_customers_with_orders}"
        description: "Total customers who have placed orders"
        tags:
          - funnel
          - stage2
          - conversion
        terms:
          - funnel.ordering_customers
          - customer.converted
      
      total_orders_in_funnel:
        type: sum
        expression: "{sales_funnel.stage_3_orders_placed}"
        description: "Total orders placed"
        tags:
          - funnel
          - stage3
          - orders
        terms:
          - funnel.orders
          - sales.order_count
      
      total_orders_with_items:
        type: sum
        expression: "{sales_funnel.stage_4_orders_with_items}"
        description: "Total orders with line items"
        tags:
          - funnel
          - stage4
          - cart
        terms:
          - funnel.completed_orders
          - sales.orders_with_items
      
      total_shipped_orders:
        type: sum
        expression: "{sales_funnel.stage_5_orders_shipped}"
        description: "Total orders shipped"
        tags:
          - funnel
          - stage5
          - fulfillment
        terms:
          - funnel.shipped
          - logistics.shipments
      
      avg_registration_conversion:
        type: avg
        expression: "{sales_funnel.conversion_rate_registration_to_order}"
        description: "Average conversion rate from registration to order"
        tags:
          - funnel
          - conversion
          - registration
        terms:
          - funnel.registration_conversion
          - conversion.reg_to_order
      
      avg_order_to_shipment_conversion:
        type: avg
        expression: "{sales_funnel.conversion_rate_order_to_shipment}"
        description: "Average conversion rate from order to shipment"
        tags:
          - funnel
          - conversion
          - fulfillment
        terms:
          - funnel.shipment_conversion
          - conversion.order_to_ship
      
      avg_overall_conversion:
        type: avg
        expression: "{sales_funnel.overall_conversion_rate}"
        description: "Average end-to-end conversion rate"
        tags:
          - funnel
          - conversion
          - overall
        terms:
          - funnel.overall_conversion
          - conversion.end_to_end
      
      total_registration_dropoff:
        type: sum
        expression: "{sales_funnel.drop_off_after_registration}"
        description: "Total customers who registered but never ordered"
        tags:
          - funnel
          - dropoff
          - registration
        terms:
          - funnel.registration_dropoff
          - churn.non_converting
      
      total_unfulfilled_orders:
        type: sum
        expression: "{sales_funnel.drop_off_orders_not_shipped}"
        description: "Total orders not shipped"
        tags:
          - funnel
          - dropoff
          - fulfillment
        terms:
          - funnel.unfulfilled
          - logistics.pending_shipments
    
    segments:
      high_converting_regions:
        expression: "{sales_funnel.overall_conversion_rate} >= 0.5"
        description: "Regions with >50% end-to-end conversion"
        tags:
          - funnel
          - performance
          - high_converting
        terms:
          - funnel.high_performers
          - performance.strong_regions
      
      low_converting_regions:
        expression: "{sales_funnel.overall_conversion_rate} < 0.3"
        description: "Regions with <30% end-to-end conversion"
        tags:
          - funnel
          - performance
          - low_converting
        terms:
          - funnel.low_performers
          - performance.weak_regions
      
      registration_bottleneck:
        expression: "{sales_funnel.conversion_rate_registration_to_order} < 0.3"
        description: "Regions with registration-to-order issues"
        tags:
          - funnel
          - bottleneck
          - registration
        terms:
          - funnel.registration_bottleneck
          - alert.acquisition_issue
      
      fulfillment_bottleneck:
        expression: "{sales_funnel.conversion_rate_order_to_shipment} < 0.8"
        description: "Regions with fulfillment issues"
        tags:
          - funnel
          - bottleneck
          - fulfillment
        terms:
          - funnel.fulfillment_bottleneck
          - alert.shipping_issue
      
      high_dropoff_regions:
        expression: "{sales_funnel.drop_off_after_registration} >= 50"
        description: "Regions with 50+ non-converting customers"
        tags:
          - funnel
          - dropoff
          - alert
        terms:
          - funnel.high_dropoff
          - alert.conversion_problems
    
    dimensions:
      includes:
        - funnel_date
        - region_id
        - region_name
      

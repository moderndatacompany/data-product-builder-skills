checks:
  aggregated.sales_funnel_analysis:
    completeness:
      - missing_count(funnel_date) = 0:
          name: no_missing_dates
          attributes:
            description: "All funnel records must have a date"
      
      - missing_count(region_id) = 0:
          name: no_missing_region_ids
          attributes:
            description: "All funnel records must have a region ID"
      
      - missing_count(region_name) = 0:
          name: no_missing_region_names
          attributes:
            description: "All funnel records must have a region name"
      
      - row_count > 10:
          name: sufficient_funnel_records
          attributes:
            description: "At least 10 funnel analysis records"
    
    validity:
      - failed rows:
          name: non_negative_stage_values
          fail query: |
            SELECT funnel_date, region_name,
                   stage_1_registered_customers,
                   stage_2_customers_with_orders,
                   stage_3_orders_placed,
                   stage_4_orders_with_items,
                   stage_5_orders_shipped
            from aggregated.sales_funnel_analysis
            WHERE stage_1_registered_customers < 0
               OR stage_2_customers_with_orders < 0
               OR stage_3_orders_placed < 0
               OR stage_4_orders_with_items < 0
               OR stage_5_orders_shipped < 0
          samples limit: 10
          attributes:
            description: "All stage values must be non-negative"
      
      - failed rows:
          name: funnel_progression_logic
          fail query: |
            SELECT funnel_date, region_name,
                   stage_1_registered_customers,
                   stage_2_customers_with_orders,
                   stage_3_orders_placed,
                   stage_4_orders_with_items,
                   stage_5_orders_shipped
            from aggregated.sales_funnel_analysis
            WHERE stage_2_customers_with_orders > stage_1_registered_customers
               OR stage_4_orders_with_items > stage_3_orders_placed
               OR stage_5_orders_shipped > stage_3_orders_placed
          samples limit: 10
          attributes:
            description: "Funnel stages must follow logical progression"
      
      - failed rows:
          name: valid_conversion_rates
          fail query: |
            SELECT funnel_date, region_name,
                   conversion_rate_registration_to_order,
                   conversion_rate_order_to_items,
                   conversion_rate_order_to_shipment
            from aggregated.sales_funnel_analysis
            WHERE conversion_rate_registration_to_order < 0 
               OR conversion_rate_registration_to_order > 1
               OR conversion_rate_order_to_items < 0 
               OR conversion_rate_order_to_items > 1
               OR conversion_rate_order_to_shipment < 0 
               OR conversion_rate_order_to_shipment > 1
          samples limit: 10
          attributes:
            description: "Conversion rates must be between 0 and 1"
      
      # This will FAIL - checking for 100% conversion rates
      - failed rows:
          name: perfect_conversion_check
          fail query: |
            SELECT funnel_date, region_name,
                   conversion_rate_registration_to_order,
                   stage_1_registered_customers
            from aggregated.sales_funnel_analysis
            WHERE stage_1_registered_customers > 0 
              AND conversion_rate_registration_to_order < 1.0
          samples limit: 10
          attributes:
            description: "All customers should convert to orders (100% rate) (EXPECTED TO FAIL)"
      
      # This will FAIL - checking for high order-to-shipment conversion
      - failed rows:
          name: high_shipment_conversion_check
          fail query: |
            SELECT funnel_date, region_name,
                   conversion_rate_order_to_shipment,
                   stage_3_orders_placed
            from aggregated.sales_funnel_analysis
            WHERE stage_3_orders_placed > 0 
              AND conversion_rate_order_to_shipment < 0.95
          samples limit: 10
          attributes:
            description: "Order-to-shipment conversion should be >= 95% (EXPECTED TO FAIL)"
    
    uniqueness:
      - duplicate_count(funnel_date, region_id) = 0:
          name: unique_date_region_combinations
          attributes:
            description: "Date and region combinations must be unique"


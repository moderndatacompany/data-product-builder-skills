checks:
  sales.orders:

    validity:
      - failed rows:
          name: negative_order_amounts
          fail query: |
            SELECT
              order_id,
              order_date,
              customer_id,
              subtotal_amount,
              discount_amount,
              tax_amount,
              shipping_cost,
              total_amount
            FROM sales.orders
            WHERE subtotal_amount < 0
               OR discount_amount < 0
               OR tax_amount < 0
               OR shipping_cost < 0
               OR total_amount < 0
          samples limit: 10
          attributes:
            description: "Order amounts cannot be negative"

      - failed rows:
          name: invalid_order_status
          fail query: |
            SELECT order_id, order_date, order_status
            FROM sales.orders
            WHERE order_status NOT IN ('Completed', 'Shipped', 'Processing', 'Cancelled', 'Returned')
          samples limit: 10
          attributes:
            description: "Order status must be one of the allowed values"

      - failed rows:
          name: discount_not_exceed_subtotal
          fail query: |
            SELECT order_id, order_date, subtotal_amount, discount_amount
            FROM sales.orders
            WHERE discount_amount > subtotal_amount
          samples limit: 10
          attributes:
            description: "Order discount amount must not exceed subtotal amount"


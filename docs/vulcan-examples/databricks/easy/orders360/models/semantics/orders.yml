kind: semantic
name: orders
depends_on: sales.orders
description: Orders fact (semantic layer)

dimensions:
  - order_date
  - customer_id
  - product_id
  - quantity
  - discount
  - total_amount
  - order_id
  - unit_price
  - tax
  - shipping_cost

measures:
  - name: total_orders
    type: count_distinct
    expression: "{orders.order_id}"
    description: Total number of orders

  - name: total_revenue
    type: sum
    expression: "{orders.total_amount}"
    description: Total revenue from all orders

  - name: average_order_value
    type: avg
    expression: "{orders.total_amount}"
    description: Average value per order

  - name: total_quantity_sold
    type: sum
    expression: "{orders.quantity}"
    description: Total quantity of items sold

  - name: total_tax_collected
    type: sum
    expression: "{orders.tax}"
    description: Total tax collected

  - name: total_shipping_cost
    type: sum
    expression: "{orders.shipping_cost}"
    description: Total shipping costs

segments:
  - name: recent_orders
    expression: "{orders.order_date} >= DATE_SUB(CURRENT_DATE(), 7)"
    description: Orders placed in the last 7 days

  - name: high_value_orders
    expression: "{orders.total_amount} >= 500"
    description: Orders with total amount >= $500

  - name: discounted_orders
    expression: "{orders.discount} > 0"
    description: Orders with discount applied

joins:
  - name: customers
    type: many_to_one
    expression: "{orders.customer_id} = {customers.customer_id}"

  - name: products
    type: many_to_one
    expression: "{orders.product_id} = {products.product_id}"

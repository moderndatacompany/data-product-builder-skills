# Converted from legacy: semantics/seeds/products.yml
kind: semantic
name: products
depends_on: raw.raw_products
description: "Product dimension table with catalog details, pricing, and inventory levels"

ai_context:
  instructions: >
    Use this semantic model for questions about products. Prefer its measures for
    aggregations and its dimensions for filtering, grouping, cohorting, and
    drill-downs.
  synonyms:
    - "products"
  examples:
    - "Show products trends over time."
    - "Break down products by key dimensions."

dimensions:
  - product_id
  - product_name
  - category
  - price
  - stock_quantity

measures:
  - name: total_products
    ai_context:
      instructions: >
        Use this measure when the question asks for total products. Respect its
        aggregation type and any configured filters before comparing or segmenting
        results.
      synonyms:
        - "total products"
        - "total_products"
        - "total"
        - "products"
      examples:
        - "What is total products by month?"
        - "Compare total products across key segments."
    type: count
    expression: "{products.product_id}"
    description: "Total number of products"
    tags:
      - product
      - count
      - metric
    terms:
      - product.total_products
      - metric.product_count

  - name: total_inventory
    ai_context:
      instructions: >
        Use this measure when the question asks for total inventory. Respect its
        aggregation type and any configured filters before comparing or segmenting
        results.
      synonyms:
        - "total inventory"
        - "total_inventory"
        - "total"
        - "inventory"
      examples:
        - "What is total inventory by month?"
        - "Compare total inventory across key segments."
    type: sum
    expression: "{products.stock_quantity}"
    description: "Total inventory across all products"
    tags:
      - product
      - inventory
      - metric
    terms:
      - product.total_inventory
      - inventory.total_stock

      - "total_customer_revenue"
      - "total"
      - "customer"
    examples:
      - "What is total customer revenue by month?"
      - "Compare total customer revenue across key segments."
  type: sum
  expression: '{customer_profile.total_revenue}'
  format: currency
  description: Total lifetime value across all customers
  tags:
  - revenue
  - financial
  - metric
  terms:
  - revenue.total_customer_revenue

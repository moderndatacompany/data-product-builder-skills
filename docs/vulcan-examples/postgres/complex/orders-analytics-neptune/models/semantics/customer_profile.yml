kind: semantic
name: customer_profile
depends_on: silver_v1.dim_customer_profile
ai_context:
  instructions: >
    Use this semantic model for questions about customer profile. Prefer its measures
    for aggregations and its dimensions for filtering, grouping, cohorting, and
    drill-downs.
  synonyms:
    - "customer profile"
    - "customer_profile"
    - "customer"
    - "profile"
  examples:
    - "Show customer profile trends over time."
    - "Break down customer profile by key dimensions."

dimensions:
- customer_id
- customer_name
- email
- region_id
- region_name
- first_order_date
- last_order_date
- customer_lifetime_days
- purchase_frequency_score
- customer_segment
- favorite_category
measures:
- name: total_customers
  ai_context:
    instructions: >
      Use this measure when the question asks for total customers. Respect its
      aggregation type and any configured filters before comparing or segmenting
      results.
    synonyms:
      - "total customers"
      - "total_customers"
      - "total"
      - "customers"
    examples:
      - "What is total customers by month?"
      - "Compare total customers across key segments."
  type: count
  expression: '{customer_profile.customer_id}'
  description: Total number of customers
  tags:
  - customer
  - count
  - metric
  terms:
  - customer.total_customers
  - metric.customer_count
- name: total_customer_revenue
  ai_context:
    instructions: >
      Use this measure when the question asks for total customer revenue. Respect its
      aggregation type and any configured filters before comparing or segmenting
      results.
    synonyms:

kind: semantic
name: rfm
depends_on: gold_v1.rfm_customer_segmentation
ai_context:
  instructions: >
    Use this semantic model for questions about rfm. Prefer its measures for
    aggregations and its dimensions for filtering, grouping, cohorting, and
    drill-downs.
  synonyms:
    - "rfm"
  examples:
    - "Show rfm trends over time."
    - "Break down rfm by key dimensions."

dimensions:
- customer_id
- customer_name
- email
- region_name
- recency_days
- frequency_orders
- monetary_value
- recency_score
- frequency_score
- monetary_score
- rfm_score
- rfm_segment
- recommended_action

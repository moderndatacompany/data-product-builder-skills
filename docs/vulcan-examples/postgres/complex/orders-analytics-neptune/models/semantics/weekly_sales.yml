    synonyms:
      - "avg daily revenue in weeks"
      - "avg_daily_revenue_in_weeks"
      - "avg"
      - "daily"
    examples:
      - "What is avg daily revenue in weeks by month?"
      - "Compare avg daily revenue in weeks across key segments."
  type: avg
  expression: '{weekly_sales.avg_daily_revenue}'
  format: currency
  description: Average daily revenue within weeks
  tags:
  - metric
  - average
  - aggregate
  terms:
  - metric.avg_daily_revenue_in_weeks
  - metric.aggregate
segments:
- name: high_performing_weeks
  ai_context:
    instructions: >
      Apply this segment when the question asks for the high performing weeks subset.
      Combine it with measures to answer filtered business questions.
    synonyms:
      - "high performing weeks"
      - "high_performing_weeks"
      - "high"
      - "performing"
    examples:
      - "Show revenue for high performing weeks."
      - "How many records are in high performing weeks?"
  expression: '{weekly_sales.total_revenue} >= 20000'
  description: Weeks with revenue >= $20,000
  tags:
  - metric
  terms:
  - metric.high_performing_weeks
- name: recent_weeks
  ai_context:
    instructions: >
      Apply this segment when the question asks for the recent weeks subset. Combine it
      with measures to answer filtered business questions.
    synonyms:
      - "recent weeks"
      - "recent_weeks"
      - "recent"
      - "weeks"
    examples:
      - "Show revenue for recent weeks."
      - "How many records are in recent weeks?"
  expression: '{weekly_sales.week_start_date} >= CURRENT_DATE - INTERVAL ''4 weeks'''
  description: Last 4 weeks
  tags:
  - temporal
  - recent
  - segment
  terms:
  - temporal.recent_weeks
  - segment.recent
- name: current_year
  ai_context:
    instructions: >
      Apply this segment when the question asks for the current year subset. Combine it
      with measures to answer filtered business questions.
    synonyms:
      - "current year"
      - "current_year"
      - "current"
      - "year"
    examples:
      - "Show revenue for current year."
      - "How many records are in current year?"
  expression: '{weekly_sales.year} = EXTRACT(YEAR FROM CURRENT_DATE)'
  description: Current year weeks
  tags:
  - metric
  terms:
  - metric.current_year
joins:
- name: customer_profile
  ai_context:
    instructions: >
      Use this join when a question needs attributes or metrics from customer profile.
      Keep the configured join relationship to avoid double counting.
    synonyms:
      - "customer profile"
      - "customer_profile"
      - "customer"
      - "profile"
    examples:
      - "Analyze this model with customer profile attributes."
      - "Break measures down by customer profile."
  type: many_to_one
  expression: '{weekly_sales.customer_id} = {customer_profile.customer_id}'
- name: product_profile
  ai_context:
    instructions: >
      Use this join when a question needs attributes or metrics from product profile.
      Keep the configured join relationship to avoid double counting.
    synonyms:
      - "product profile"
      - "product_profile"
      - "product"
      - "profile"
    examples:
      - "Analyze this model with product profile attributes."
      - "Break measures down by product profile."
  type: many_to_one
  expression: '{weekly_sales.product_id} = {product_profile.product_id}'

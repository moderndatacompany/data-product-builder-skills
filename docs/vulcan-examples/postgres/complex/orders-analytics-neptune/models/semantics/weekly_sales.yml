# Converted from legacy: semantics/fct_weekly_sales.yml
kind: semantic
name: weekly_sales
depends_on: silver_v1.fct_weekly_sales
ai_context:
  instructions: >
    Use this semantic model for questions about weekly sales. Prefer its measures for
    aggregations and its dimensions for filtering, grouping, cohorting, and
    drill-downs.
  synonyms:
    - "weekly sales"
    - "weekly_sales"
    - "weekly"
    - "sales"
  examples:
    - "Show weekly sales trends over time."
    - "Break down weekly sales by key dimensions."

dimensions:
- week_start_date
- week_end_date
- year
- week_number
- region_id
- region_name
- customer_id
- product_id
measures:
- name: total_weekly_orders
  ai_context:
    instructions: >
      Use this measure when the question asks for total weekly orders. Respect its
      aggregation type and any configured filters before comparing or segmenting
      results.
    synonyms:
      - "total weekly orders"
      - "total_weekly_orders"
      - "total"
      - "weekly"
    examples:
      - "What is total weekly orders by month?"
      - "Compare total weekly orders across key segments."
  type: sum
  expression: '{weekly_sales.total_orders}'
  description: Total orders across all weeks
  tags:
  - order
  - count
  - metric
  terms:
  - order.total_weekly_orders
  - metric.order_count
- name: total_weekly_revenue
  ai_context:
    instructions: >
      Use this measure when the question asks for total weekly revenue. Respect its
      aggregation type and any configured filters before comparing or segmenting
      results.
    synonyms:
      - "total weekly revenue"
      - "total_weekly_revenue"
      - "total"
      - "weekly"
    examples:
      - "What is total weekly revenue by month?"
      - "Compare total weekly revenue across key segments."
  type: sum
  expression: '{weekly_sales.total_revenue}'
  format: currency
  description: Total revenue across all weeks
  tags:
  - revenue
  - financial
  - metric
  terms:
  - revenue.total_weekly_revenue
  - finance.gross_sales
- name: avg_weekly_order_value
  ai_context:
    instructions: >
      Use this measure when the question asks for avg weekly order value. Respect its
      aggregation type and any configured filters before comparing or segmenting
      results.
    synonyms:
      - "avg weekly order value"
      - "avg_weekly_order_value"
      - "avg"
      - "weekly"
    examples:
      - "What is avg weekly order value by month?"
      - "Compare avg weekly order value across key segments."
  type: avg
  expression: '{weekly_sales.avg_order_value}'
  format: currency
  description: Average order value across weeks
  tags:
  - metric
  - average
  - aggregate
  terms:
  - metric.avg_weekly_order_value
  - metric.aggregate
- name: avg_daily_revenue_in_weeks
  ai_context:
    instructions: >
      Use this measure when the question asks for avg daily revenue in weeks. Respect
      its aggregation type and any configured filters before comparing or segmenting

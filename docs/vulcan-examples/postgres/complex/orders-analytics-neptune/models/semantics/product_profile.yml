      - "Compare avg product revenue across key segments."
  type: avg
  expression: '{product_profile.total_revenue}'
  format: currency
  description: Average revenue per product
  tags:
  - metric
  - average
  - aggregate
  terms:
  - metric.avg_product_revenue
  - metric.aggregate

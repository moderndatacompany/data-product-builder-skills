kind: semantic
name: product_profile
depends_on: silver_v1.dim_product_profile
ai_context:
  instructions: >
    Use this semantic model for questions about product profile. Prefer its measures
    for aggregations and its dimensions for filtering, grouping, cohorting, and
    drill-downs.
  synonyms:
    - "product profile"
    - "product_profile"
    - "product"
    - "profile"
  examples:
    - "Show product profile trends over time."
    - "Break down product profile by key dimensions."

dimensions:
- product_id
- product_name
- category
- supplier_id
- supplier_name
- current_price
- customer_penetration_pct
- revenue_rank_in_category
- product_performance
- first_sale_date
- last_sale_date
measures:
- name: total_products
  ai_context:
    instructions: >
      Use this measure when the question asks for total products. Respect its
      aggregation type and any configured filters before comparing or segmenting
      results.
    synonyms:
      - "total products"
      - "total_products"
      - "total"
      - "products"
    examples:
      - "What is total products by month?"
      - "Compare total products across key segments."
  type: count
  expression: '{product_profile.product_id}'
  description: Total number of products
  tags:
  - product
  - count
  - metric
  terms:
  - product.total_products
  - metric.product_count
- name: total_product_revenue
  ai_context:
    instructions: >
      Use this measure when the question asks for total product revenue. Respect its
      aggregation type and any configured filters before comparing or segmenting

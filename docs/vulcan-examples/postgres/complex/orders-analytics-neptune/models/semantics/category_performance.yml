kind: semantic
name: category_performance
depends_on: gold_v1.category_performance_analysis
ai_context:
  instructions: >
    Use this semantic model for questions about category performance. Prefer its
    measures for aggregations and its dimensions for filtering, grouping, cohorting,
    and drill-downs.
  synonyms:
    - "category performance"
    - "category_performance"
    - "category"
    - "performance"
  examples:
    - "Show category performance trends over time."
    - "Break down category performance by key dimensions."

dimensions:
- analysis_date
- category
- region_id
- region_name
- total_products
- active_products
- best_seller_products
- good_performer_products
- slow_mover_products
- declining_products
- stale_products
- at_risk_products
- new_products
- category_tier
- category_health_score
- top_product_name
- recommended_action
measures:
- name: total_categories
  ai_context:
    instructions: >
      Use this measure when the question asks for total categories. Respect its
      aggregation type and any configured filters before comparing or segmenting
      results.
    synonyms:
      - "total categories"
      - "total_categories"
      - "total"
      - "categories"
    examples:
      - "What is total categories by month?"
      - "Compare total categories across key segments."
  type: count
  expression: '{category_performance.category}'
  description: Total number of unique categories
  tags:
  - metric
  terms:
  - metric.total_categories

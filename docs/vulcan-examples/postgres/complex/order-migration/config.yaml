# --- Model Defaults ---
# https://tmdc-io.github.io/vulcan-book/

model_defaults:
  dialect: postgres
  start: '2025-01-01'  # Default start date for incremental models
  cron: '*/45 * * * *'  # Default: Every 15 minutes (overridden per model)
  # Note: Orders/order_items use */5 minutes, dimensions use */15-20 minutes

# ==============================================================================
# Gateway Configuration
# ==============================================================================
# Database connections and state management
gateways:
  default:
    # Primary data connection (where models are materialized)
    connection:
      type: depot
      address: dataos://vulcanpgdepot
    #   type: postgres
    #   host: localhost
    #   port: 5433
    #   user: vulcan
    #   password: vulcan
    #   database: warehouse
    #   # Docs: https://sqlmesh.readthedocs.io/en/latest/integrations/engines/postgres/

    # # State management connection (tracks model versions, runs, snapshots)
    # # Recommended: Use separate database for state in production
    # state_connection:
    #   type: postgres
    #   host: localhost
    #   port: 5431
    #   user: vulcan
    #   password: vulcan
    #   database: statestore
    #   # For production, consider using dedicated state database:
    #   # port: 5431
    #   # database: statestore

    # State schema (stores Vulcan metadata)
    # state_schema: postgres_ecommerce_state1

    # Gateway-specific variables (available in models, checks via ${variable_name})
variables:
  env: development
  region: us-west-2
  data_retention_days: 365
  alert_threshold: 100
  bronze_schema: vulcan_demo
  silver_schema: silver
  gold_schema: gold
  min_customer_count: 50
  min_order_count: 500


joins:
- name: orders
  ai_context:
    instructions: >
      Use this join when a question needs attributes or metrics from orders. Keep the
      configured join relationship to avoid double counting.
    synonyms:
      - "orders"
    examples:
      - "Analyze this model with orders attributes."

# Converted from legacy: semantics/products.yml
kind: semantic
name: products
depends_on: sales.products
ai_context:
  instructions: >
    Use this semantic model for questions about products. Prefer its measures for
    aggregations and its dimensions for filtering, grouping, cohorting, and
    drill-downs.
  synonyms:
    - "products"
  examples:
    - "Show products trends over time."
    - "Break down products by key dimensions."

dimensions:
- product_id
- product_name
- category
- subcategory
- brand
- color
- size
- price
- rating
- stock_quantity
- discontinued
measures:
- name: total_products
  ai_context:
    instructions: >
      Use this measure when the question asks for total products. Respect its
      aggregation type and any configured filters before comparing or segmenting
      results.
    synonyms:
      - "total products"
      - "total_products"
      - "total"
      - "products"
    examples:
      - "What is total products by month?"
      - "Compare total products across key segments."
  type: count
  expression: '{products.product_id}'
  tags:
  - product
  - count
  - metric
  terms:
  - product.total_products
  - metric.product_count
- name: active_products
  ai_context:
    instructions: >
      Use this measure when the question asks for active products. Respect its
      aggregation type and any configured filters before comparing or segmenting
      results.
    synonyms:
      - "active products"
      - "active_products"
      - "active"
      - "products"
    examples:
      - "What is active products by month?"
      - "Compare active products across key segments."
  type: count
  expression: '*'
  filters:
  - '{products.discontinued} = FALSE'
  tags:
  - customer
  - active
  - engagement
  terms:
  - customer.active
  - engagement.active
segments:
- name: high_rated_products
  ai_context:
    instructions: >
      Apply this segment when the question asks for the high rated products subset.
      Combine it with measures to answer filtered business questions.
    synonyms:
      - "high rated products"
      - "high_rated_products"
      - "high"
      - "rated"
    examples:
      - "Show revenue for high rated products."
      - "How many records are in high rated products?"
  expression: '{products.rating} >= 4.0'
  tags:
  - product
  - rating
  - segment
  terms:
  - product.top_rated
  - segment.high_rated_products

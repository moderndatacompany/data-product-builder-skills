test_sales_shipments_single:
  model: sales.shipments
  description: >
    Full-output test for the Shipments model using a single shipment record.

  vars:
    start: '2024-03-01'
    end: '2024-03-31'

  inputs:
    raw.raw_shipments:
      rows:
        - shipment_id: SHP9001
          order_id: O4000
          shipped_date: '2024-03-12'
          delivered_date: '2024-03-15'
          carrier: UPS
          tracking_number: 1Z-9001
          shipping_status: Delivered
          shipping_cost: 6.50

  outputs:
    query:
      rows:
        - shipment_id: "SHP9001"
          order_id: "O4000"
          shipped_date: "2024-03-12"
          delivered_date: "2024-03-15"
          carrier: "UPS"
          tracking_number: "1Z-9001"
          shipping_status: "Delivered"
          shipping_cost: 6.5


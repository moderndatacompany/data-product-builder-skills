# ==============================================================================
# Vulcan Data Product Configuration - TechFab Customer Intelligence & Segmentation (PostgreSQL)
# ==============================================================================

# Basic Information
vde: false
discoverable: true
version: 0.1.2
alignment: source_aligned
reference_links:
  - name: Document
    href: https://tmdc-io.github.io/vulcan-book/

name: customer-intelligence-postgres
display_name: Customer Intelligence & Segmentation (PostgreSQL)
description: RFM-based customer segmentation enabling sales teams to identify high-value accounts, at-risk customers, and upsell opportunities for targeted engagement and retention strategies.

# Classification
tags:
  - customer-analytics
  - rfm-segmentation
  - customer-intelligence

terms:
  - rfm-segmentation
  - customer-lifetime-value
  - customer-retention

# Domain
domain: customer_analytics

# ==============================================================================
# Analytics & Telemetry (Vulcan CloudEvents)
# ==============================================================================
# analytics:
#   enabled: false  # Set to true and provide api_key to enable in production
  # api_key: ${VULCAN_API_KEY}
  # api_base_url: https://your-dataos-instance.com

# ==============================================================================
# Linter Configuration
# ==============================================================================
linter:
  enabled: false
  warn_rules:
    - preferassertions
    - nomissingaudits

# ==============================================================================
# Model Defaults
# ==============================================================================
model_defaults:
  dialect: postgres
  start: '2024-07-01'  # Start of customer data
  cron: '@daily'  # Daily refresh for all models

# ==============================================================================
# Gateway Configuration
# ==============================================================================
gateways:
  default:
    connection:
      type: depot
      address: dataos://customerplatform

# ==============================================================================
# OpenLineage Configuration (Data Lineage Tracking)
# ==============================================================================
openlineage:
  enabled: false
  # url: https://your-dataos-instance.dataos.cloud/hera
  # timeout_seconds: 30
  # api_key: ${OPENLINEAGE_API_KEY}

# ==============================================================================
# Notification Configuration
# ==============================================================================
notification_targets:
  - type: console
    notify_on:
      - apply_start
      - apply_end
      - apply_failure
      - run_start
      - run_end
      - run_failure
      - audit_failure
      - check_start
      - check_end
      - check_failure
      - migration_start
      - migration_end
      - migration_failure
      - plan_change

# ==============================================================================
# Users & Access Control
# ==============================================================================
users:
  - username: shreyasikarwartmdcio
    email: shreya.sikarwar@tmdc.io
    type: OWNER
  - username: aakanshajainctmdcio
    email: aakansha.jain@tmdc.io
    type: CONTRIBUTOR

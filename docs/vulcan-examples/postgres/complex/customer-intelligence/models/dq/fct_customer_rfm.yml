# kind: dq — converted from checks/fct_customer_rfm.yml
kind: dq
name: fct_customer_rfm_dq
depends_on: CUSTOMER_PLATFORM.GOLD.FCT_CUSTOMER_RFM

rules:
- row_count >= 20:
    name: minimum_customer_rfm_records
    dimension: completeness
    description: At least 20 customer RFM records should exist (active customers)

- missing_count(customer_id) = 0:
    name: no_missing_customer_id
    dimension: completeness
    description: All records must have a customer_id

- missing_count(rfm_score) = 0:
    name: no_missing_rfm_score
    dimension: completeness
    description: All records must have a calculated RFM score

- missing_count(segment_id) = 0:
    name: no_missing_segment_id
    dimension: completeness
    description: All records must be assigned to a segment

- invalid_count(recency_score) = 0:
    name: recency_score_valid_range
    dimension: validity
    description: Recency score must be between 1 and 5
    valid min: 1
    valid max: 5

- invalid_count(frequency_score) = 0:
    name: frequency_score_valid_range
    dimension: validity
    description: Frequency score must be between 1 and 5
    valid min: 1
    valid max: 5

- invalid_count(monetary_score) = 0:
    name: monetary_score_valid_range
    dimension: validity
    description: Monetary score must be between 1 and 5
    valid min: 1
    valid max: 5

- invalid_count(recency_days) = 0:
    name: recency_days_non_negative
    dimension: validity
    description: Recency days must be non-negative
    valid min: 0

- invalid_count(frequency_count) = 0:
    name: frequency_count_non_negative
    dimension: validity
    description: Frequency count must be non-negative
    valid min: 0

- invalid_count(monetary_value) = 0:
    name: monetary_value_non_negative
    dimension: validity
    description: Monetary value must be non-negative
    valid min: 0

- failed rows:
    name: segment_id_exists_in_seed
    dimension: validity
    description: All segment_ids must exist in customer_segments_rfm seed
    fail query: |
      SELECT rfm.customer_id, rfm.segment_id
      FROM CUSTOMER_PLATFORM.GOLD.FCT_CUSTOMER_RFM rfm
      LEFT JOIN CUSTOMER_PLATFORM.SEED.CUSTOMER_SEGMENTS_RFM seg ON rfm.segment_id = seg.segment_id
      WHERE seg.segment_id IS NULL
    samples limit: 10

- failed rows:
    name: customer_id_exists_in_master
    dimension: validity
    description: All customer_ids must exist in customer_master
    fail query: |
      SELECT rfm.customer_id, rfm.customer_name
      FROM CUSTOMER_PLATFORM.GOLD.FCT_CUSTOMER_RFM rfm
      LEFT JOIN CUSTOMER_PLATFORM.BRONZE.CUSTOMER_MASTER cm ON rfm.customer_id = cm."customer_id"
      WHERE cm."customer_id" IS NULL
    samples limit: 10

- duplicate_count(customer_id) = 0:
    name: unique_customer_ids
    dimension: uniqueness
    description: Each customer_id must be unique (one RFM record per customer)

- avg(monetary_value) > 50000:
    name: average_monetary_value_reasonable
    dimension: accuracy
    description: Average monetary value should exceed $50K for B2B customers

- avg(frequency_count) > 1:
    name: average_frequency_above_one
    dimension: accuracy
    description: Average order frequency should be greater than 1

- invalid_percent(segment_name) < 1%:
    name: valid_segment_names
    dimension: accuracy
    description: Segment names must match defined RFM segments
    valid values: [Champions, Loyal Customers, Potential Loyalists, New Customers, Promising, Need Attention,
  At Risk, About to Sleep, Hibernating, Lost]

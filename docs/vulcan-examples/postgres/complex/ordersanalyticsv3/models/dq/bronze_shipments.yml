# kind: dq — converted from checks/bronze_shipments.yml
kind: dq
name: shipments_dq
depends_on: raw.shipments
rules:
- missing_count(shipment_id) = 0:
    name: no_missing_shipment_ids
    dimension: completeness
    description: All shipments must have a shipment ID
- missing_count(order_id) = 0:
    name: no_missing_order_ids
    dimension: completeness
    description: All shipments must have an order ID
- missing_count(shipped_date) = 0:
    name: no_missing_shipped_dates
    dimension: completeness
    description: All shipments must have a shipped date
- missing_count(carrier) = 0:
    name: no_missing_carriers
    dimension: completeness
    description: All shipments must have a carrier
- row_count > 950:
    name: high_shipment_rate
    dimension: completeness
    description: Should have more than 950 shipments (EXPECTED TO FAIL)
- failed rows:
    name: positive_shipment_ids
    dimension: validity
    fail query: |
      SELECT shipment_id, order_id, shipped_date, carrier
      from raw.shipments
      WHERE shipment_id <= 0
    samples limit: 10
    description: Shipment IDs must be positive
- failed rows:
    name: valid_carriers
    dimension: validity
    fail query: |
      SELECT shipment_id, order_id, shipped_date, carrier
      from raw.shipments
      WHERE carrier NOT IN ('DHL', 'UPS', 'FedEx', 'USPS', 'BlueDart')
    samples limit: 10
    description: Carriers must be from valid set
- failed rows:
    name: valid_order_references
    dimension: validity
    fail query: |
      SELECT s.shipment_id, s.order_id, s.shipped_date
      from raw.shipments s
      LEFT JOIN raw.orders o ON s.order_id = o.order_id
      WHERE o.order_id IS NULL
    samples limit: 10
    description: All shipments must reference valid orders
- failed rows:
    name: shipped_after_order
    dimension: validity
    fail query: |
      SELECT s.shipment_id, s.order_id, o.order_date, s.shipped_date
      from raw.shipments s
      INNER JOIN raw.orders o ON s.order_id = o.order_id
      WHERE s.shipped_date < DATE(o.order_date)
    samples limit: 10
    description: Shipment date must be on or after order date
- failed rows:
    name: same_day_shipping_check
    dimension: validity
    fail query: |
      SELECT s.shipment_id, s.order_id, o.order_date, s.shipped_date
      from raw.shipments s
      INNER JOIN raw.orders o ON s.order_id = o.order_id
      WHERE s.shipped_date > DATE(o.order_date)
    samples limit: 10
    description: All shipments should be same-day (EXPECTED TO FAIL)
- duplicate_count(shipment_id) = 0:
    name: unique_shipment_ids
    dimension: uniqueness
    description: Shipment IDs must be unique

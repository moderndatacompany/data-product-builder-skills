# kind: dq — converted from checks/gold_rfm_customer_segmentation.yml
kind: dq
name: rfm_customer_segmentation_dq
depends_on: aggregated.rfm_customer_segmentation
rules:
- missing_count(customer_id) = 0:
    name: no_missing_customer_ids
    dimension: completeness
    description: All RFM records must have a customer ID
- missing_count(customer_name) = 0:
    name: no_missing_names
    dimension: completeness
    description: All RFM records must have a customer name
- missing_count(rfm_segment) = 0:
    name: no_missing_segments
    dimension: completeness
    description: All RFM records must have a segment
- missing_count(recency_score) = 0:
    name: no_missing_recency_scores
    dimension: completeness
    description: All RFM records must have a recency score
- missing_count(frequency_score) = 0:
    name: no_missing_frequency_scores
    dimension: completeness
    description: All RFM records must have a frequency score
- missing_count(monetary_score) = 0:
    name: no_missing_monetary_scores
    dimension: completeness
    description: All RFM records must have a monetary score
- failed rows:
    name: valid_recency_scores
    dimension: validity
    fail query: |
      SELECT customer_id, customer_name, recency_score
      from aggregated.rfm_customer_segmentation
      WHERE recency_score < 1 OR recency_score > 5
    samples limit: 10
    description: Recency scores must be between 1 and 5
- failed rows:
    name: valid_frequency_scores
    dimension: validity
    fail query: |
      SELECT customer_id, customer_name, frequency_score
      from aggregated.rfm_customer_segmentation
      WHERE frequency_score < 1 OR frequency_score > 5
    samples limit: 10
    description: Frequency scores must be between 1 and 5
- failed rows:
    name: valid_monetary_scores
    dimension: validity
    fail query: |
      SELECT customer_id, customer_name, monetary_score
      from aggregated.rfm_customer_segmentation
      WHERE monetary_score < 1 OR monetary_score > 5
    samples limit: 10
    description: Monetary scores must be between 1 and 5
- failed rows:
    name: valid_rfm_segments
    dimension: validity
    fail query: "SELECT customer_id, customer_name, rfm_segment\nfrom aggregated.rfm_customer_segmentation\nWHERE rfm_segment NOT IN (\n  'Champions', 'Loyal Customers', 'Potential Loyalists', \n  'Recent\
      \ Customers', 'Promising', 'Customers Needing Attention',\n  'About to Sleep', 'At Risk', 'Cannot Lose Them', \n  'Hibernating', 'Lost'\n)\n"
    samples limit: 10
    description: RFM segments must be from valid set
- failed rows:
    name: non_negative_frequency
    dimension: validity
    fail query: |
      SELECT customer_id, customer_name, frequency_orders
      from aggregated.rfm_customer_segmentation
      WHERE frequency_orders < 0
    samples limit: 10
    description: Frequency orders cannot be negative
- failed rows:
    name: non_negative_monetary
    dimension: validity
    fail query: |
      SELECT customer_id, customer_name, monetary_value
      from aggregated.rfm_customer_segmentation
      WHERE monetary_value < 0
    samples limit: 10
    description: Monetary value cannot be negative
- failed rows:
    name: all_champions_check
    dimension: validity
    fail query: |
      SELECT customer_id, customer_name, rfm_segment, rfm_score
      from aggregated.rfm_customer_segmentation
      WHERE rfm_segment != 'Champions'
    samples limit: 10
    description: All customers should be Champions (EXPECTED TO FAIL)
- failed rows:
    name: high_rfm_score_check
    dimension: validity
    fail query: |
      SELECT customer_id, customer_name, rfm_score, rfm_segment
      from aggregated.rfm_customer_segmentation
      WHERE rfm_score < 12
    samples limit: 10
    description: All customers should have RFM score >= 12 (EXPECTED TO FAIL)
- duplicate_count(customer_id) = 0:
    name: unique_customer_ids
    dimension: uniqueness
    description: Customer IDs must be unique

segments:
- name: high_converting_regions
  ai_context:
    instructions: >
      Apply this segment when the question asks for the high converting regions subset.
      Combine it with measures to answer filtered business questions.
    synonyms:
      - "high converting regions"
      - "high_converting_regions"
      - "high"
      - "converting"
    examples:
      - "Show revenue for high converting regions."
      - "How many records are in high converting regions?"
  expression: '{sales_funnel.overall_conversion_rate} >= 0.5'
  description: Regions with >50% end-to-end conversion
  tags:
  - metric
  terms:
  - metric.high_converting_regions
- name: low_converting_regions

      - "Compare total ordering customers across key segments."
  type: sum
  expression: '{sales_funnel.stage_2_customers_with_orders}'
  description: Total customers who have placed orders
  tags:
  - order
  - count
  - metric
  terms:
  - order.total_ordering_customers
  - metric.order_count

# Converted from legacy: semantics/sales_funnel_analysis.yml
kind: semantic
name: sales_funnel
depends_on: aggregated.sales_funnel_analysis
ai_context:
  instructions: >
    Use this semantic model for questions about sales funnel. Prefer its measures for
    aggregations and its dimensions for filtering, grouping, cohorting, and
    drill-downs.
  synonyms:
    - "sales funnel"
    - "sales_funnel"
    - "sales"
    - "funnel"
  examples:
    - "Show sales funnel trends over time."
    - "Break down sales funnel by key dimensions."

dimensions:
- funnel_date
- region_id
- region_name
measures:
- name: total_registered_customers
  ai_context:
    instructions: >
      Use this measure when the question asks for total registered customers. Respect
      its aggregation type and any configured filters before comparing or segmenting
      results.
    synonyms:
      - "total registered customers"
      - "total_registered_customers"
      - "total"
      - "registered"
    examples:
      - "What is total registered customers by month?"
      - "Compare total registered customers across key segments."
  type: sum
  expression: '{sales_funnel.stage_1_registered_customers}'
  description: Total registered customers across all regions
  tags:
  - customer
  - count
  - metric
  terms:
  - customer.total_registered_customers
  - metric.customer_count
- name: total_ordering_customers
  ai_context:
    instructions: >
      Use this measure when the question asks for total ordering customers. Respect its
      aggregation type and any configured filters before comparing or segmenting

vde: false
display_name: Orders360
discoverable: true
version: 0.1.2
alignment: source_aligned
domain: sales
tags:
  - fabric
  - sales
  - analytics
terms:
  - glossary.data_product
  - glossary.analytics_platform
  - glossary.business_intelligence
reference_links:
  - name: Document
    href: https://tmdc-io.github.io/vulcan-book/

name: orders360
tenant: sales
description: Daily sales analytics pipeline tracking order volumes, revenue trends, and customer activity on Microsoft Fabric.

# --- Gateway Connection ---
gateways:
  default:
    connection:
      type: fabric
      host: {{ env_var('FABRIC_HOST') }}
      workspace_id: {{ env_var('FABRIC_WORKSPACE_ID') }}
      tenant_id: {{ env_var('FABRIC_TENANT_ID') }}
      port: {{ env_var('FABRIC_PORT') }}
      user: {{ env_var('FABRIC_USER') }}
      password: {{ env_var('FABRIC_PASSWORD') }}
      driver_name: "ODBC Driver 18 for SQL Server"
      odbc_properties:
        Authentication: ActiveDirectoryServicePrincipal
      database: {{ env_var('FABRIC_DATABASE') }}
    state_connection:
      type: postgres
      host: {{ env_var('STATESTORE_HOST') }}
      port: {{ env_var('STATESTORE_PORT') }}
      database: {{ env_var('STATESTORE_DATABASE') }}
      user: {{ env_var('STATESTORE_USER') }}
      password: {{ env_var('STATESTORE_PASSWORD') }}

default_gateway: default

# --- Model Defaults ---
model_defaults:
  dialect: fabric
  start: 2024-01-01
  cron: '@daily'

# --- Linting Rules ---
linter:
  enabled: true
  rules:
    - ambiguousorinvalidcolumn
    - invalidselectstarexpansion
    - noambiguousprojections

version: v1alpha
type: vulcan
name: orders360-vdetrue
description: >-
  Orders360 (VDE Enabled) Snowflake data product - seed-driven customer
  segmentation joined to a customer dimension and incremental orders fact,
  materialized into the DEMODB schema with Virtual Data Environments turned on.
tags:
  - snowflake
  - orders360
  - vde_enabled
  - sales
spec:
  runAsUser: "anushkarakeshtmdcio"
  compute: pacific
  engine: snowflake
  repo:
    url: https://bitbucket.org/rubik_/vulcan-examples
    syncFlags:
      - '--ref=main'
      - '--submodules=off'
    baseDir: vulcan-examples/snowflake/easy/orders360-vdetrue
    secret: se-sandbox:gitsecretsn
  depots:
    - dataos://snowflakevulcan?purpose=rw
  workflow:
    type: schedule
    schedule:
      crons:
        - '0 2 * * *'
      endOn: '2027-01-01T00:00:00-00:00'
      timezone: 'US/Pacific'
      concurrencyPolicy: Forbid
    logLevel: INFO
    resource:
      request:
        cpu: "200m"
        memory: "512Mi"
      limit:
        cpu: "1000m"
        memory: "1Gi"
    migrate:
      command:
        - vulcan
      arguments:
        - migrate
    plan:
      command:
        - vulcan
      arguments:
        - --log-to-stdout
        - plan
        - --auto-apply
    run:
      command:
        - vulcan
      arguments:
        - --log-to-stdout
        - run
  api:
    replicas: 1
    logLevel: INFO
    resource:
      request:
        cpu: "200m"
        memory: "512Mi"
      limit:
        cpu: "1000m"
        memory: "1Gi"

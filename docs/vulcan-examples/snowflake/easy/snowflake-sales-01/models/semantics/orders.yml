segments:
- name: recent_orders
  ai_context:
    instructions: >
      Apply this segment when the question asks for the recent orders subset. Combine it
      with measures to answer filtered business questions.
    synonyms:
      - "recent orders"
      - "recent_orders"
      - "recent"
      - "orders"
    examples:
      - "Show revenue for recent orders."
      - "How many records are in recent orders?"
  expression: '{orders.ORDER_DATE} >= CURRENT_DATE - INTERVAL ''7 days'''
  description: Orders placed in the last 7 days
  tags:
  - temporal
  - recent
  - segment
  terms:
  - temporal.recent_orders
  - segment.recent
- name: high_value_orders

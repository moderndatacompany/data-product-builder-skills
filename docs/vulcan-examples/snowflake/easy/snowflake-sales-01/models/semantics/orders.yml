      - "high_value_orders"
      - "high"
      - "value"
    examples:
      - "Show revenue for high value orders."
      - "How many records are in high value orders?"
  expression: '{orders.TOTAL_AMOUNT} >= 500'
  description: Orders with total amount >= $500
  tags:
  - revenue
  - high_value
  - segment
  terms:
  - revenue.premium
  - segment.high_value_orders

    synonyms:
      - "total orders"
      - "total_orders"
      - "total"
      - "orders"
    examples:
      - "What is total orders by month?"
      - "Compare total orders across key segments."
  type: count_distinct
  expression: '{orders.ORDER_ID}'
  description: Total number of orders
  tags:
  - order
  - count
  - metric
  terms:
  - order.total_orders
  - metric.order_count
- name: total_revenue

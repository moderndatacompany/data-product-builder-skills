# kind: dq — converted from checks/products.yml
kind: dq
name: PRODUCTS_dq
depends_on: SALES.PRODUCTS
rules:
- failed rows:
    name: invalid_price_range
    dimension: validity
    fail query: |
      SELECT PRODUCT_ID, PRODUCT_NAME, PRICE
      FROM SALES.PRODUCTS
      WHERE PRICE <= 0 OR PRICE > 100000
    samples limit: 10
    description: Product price must be between $0.01 and $100,000
- failed rows:
    name: invalid_rating_range
    dimension: validity
    fail query: |
      SELECT PRODUCT_ID, PRODUCT_NAME, RATING
      FROM SALES.PRODUCTS
      WHERE RATING < 1.0 OR RATING > 5.0
    samples limit: 10
    description: Product rating must be between 1.0 and 5.0

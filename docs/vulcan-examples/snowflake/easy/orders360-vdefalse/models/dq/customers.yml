kind: dq
name: CUSTOMERS_dq
depends_on: DEMODB.VDEFALSE.CUSTOMERS
rules:
  - missing_count(CUSTOMER_ID) = 0:
      name: customer_id_not_null
      dimension: completeness
      description: Customer ID must never be null
  - failed rows:
      name: invalid_email_format
      dimension: validity
      fail query: |
        SELECT CUSTOMER_ID, FULL_NAME, EMAIL
        FROM DEMODB.VDEFALSE.CUSTOMERS
        WHERE EMAIL NOT LIKE '%@%' OR EMAIL IS NULL
      samples limit: 10
      description: Email addresses must be in a valid format
  - failed rows:
      name: loyalty_score_in_range
      dimension: validity
      fail query: |
        SELECT CUSTOMER_ID, LOYALTY_SCORE
        FROM DEMODB.VDEFALSE.CUSTOMERS
        WHERE LOYALTY_SCORE < 0 OR LOYALTY_SCORE > 100
      samples limit: 10
      description: Loyalty score must be in 0-100

test_sales_analytics_customers_single:
  model: DEMODB.VDEFALSE.CUSTOMERS
  description: >-
    Single-record test for the customers model. Verifies pass-through casts,
    full-name concatenation, and the constructed ADDRESS_LINE.

  inputs:
    VULCAN.RAW.CUSTOMERS:
      rows:
        - CUSTOMER_ID: C100
          FIRST_NAME: Alice
          LAST_NAME: Johnson
          EMAIL: alice.johnson@example.com
          PHONE: "555-9999"
          ADDRESS_LINE1: "10 Market St"
          ADDRESS_LINE2: "Suite 200"
          CITY: "Denver"
          STATE: "CO"
          POSTAL_CODE: "80205"
          CUSTOMER_SEGMENT: "Gold"
          ACCOUNT_STATUS: "Active"
          SIGNUP_DATE: 2024-01-15
          LOYALTY_SCORE: 78

  outputs:
    query:
      rows:
        - CUSTOMER_ID: "C100"
          FULL_NAME: "Alice Johnson"
          EMAIL: "alice.johnson@example.com"
          PHONE: "555-9999"
          ADDRESS_LINE: "10 Market St Suite 200 Denver CO 80205"
          CUSTOMER_SEGMENT: "Gold"
          ACCOUNT_STATUS: "Active"
          SIGNUP_DATE: "2024-01-15"
          LOYALTY_SCORE: 78

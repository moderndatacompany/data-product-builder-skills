- name: '"QCOMMERCE_PLATFORM"."EXT_RAW"."ORDERS"'
  columns:
    ORDER_ID: VARCHAR(50)
    CUSTOMER_ID: VARCHAR(50)
    CITY: VARCHAR(100)
    ORDER_TS: TIMESTAMP
    ORDER_AMOUNT: DECIMAL(12, 2)
    PAYMENT_STATUS: VARCHAR(50)
    DELIVERY_MODE: VARCHAR(50)
- name: '"QCOMMERCE_PLATFORM"."EXT_RAW"."SHIPMENTS"'
  columns:
    SHIPMENT_ID: VARCHAR(50)
    ORDER_ID: VARCHAR(50)
    RIDER_ID: VARCHAR(50)
    PICKUP_TS: TIMESTAMP
    DELIVERED_TS: TIMESTAMP
    SHIPMENT_STATUS: VARCHAR(50)
    SCAN_COUNT: DECIMAL(38, 0)
- name: '"QCOMMERCE_PLATFORM"."EXT_RAW"."CUSTOMERS"'
  columns:
    CUSTOMER_ID: VARCHAR(50)
    CUSTOMER_NAME: VARCHAR(200)
    CUSTOMER_TIER: VARCHAR(50)
    SIGNUP_CITY: VARCHAR(100)
    IS_ACTIVE: BOOLEAN

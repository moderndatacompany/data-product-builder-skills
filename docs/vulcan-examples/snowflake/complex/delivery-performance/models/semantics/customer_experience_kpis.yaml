models:
  QCOMMERCE_PLATFORM.GOLD.CUSTOMER_EXPERIENCE_KPIS:
    ai_context:
      instructions: >
        Use this semantic model for questions about customer experience kpis. Prefer its
        measures for aggregations and its dimensions for filtering, grouping, cohorting,
        and drill-downs.
      synonyms:
        - "customer experience kpis"
        - "customer_experience_kpis"
        - "customer"
        - "experience"
      examples:
        - "Show customer experience kpis trends over time."
        - "Break down customer experience kpis by key dimensions."
    alias: customer_experience_kpis

    dimensions:
      includes:
        - DS
        - CITY
        - CUSTOMER_TIER
        - EXPERIENCE_RISK_SEGMENT

    measures:
      TOTAL_ORDERS:
        ai_context:
          instructions: >
            Use this measure when the question asks for total orders. Respect its aggregation
            type before comparing or segmenting results.
          synonyms:
            - "total orders"
            - "total_orders"
            - "total"
            - "orders"
          examples:
            - "What is total orders by month?"
            - "Compare total orders across key dimensions."
        type: sum
        expression: "{customer_experience_kpis.TOTAL_ORDERS}"

      CUSTOMERS_IMPACTED:
        ai_context:
          instructions: >
            Use this measure when the question asks for customers impacted. Respect its
            aggregation type before comparing or segmenting results.
          synonyms:
            - "customers impacted"
            - "customers_impacted"
            - "customers"
            - "impacted"
          examples:
            - "What is customers impacted by month?"
            - "Compare customers impacted across key dimensions."

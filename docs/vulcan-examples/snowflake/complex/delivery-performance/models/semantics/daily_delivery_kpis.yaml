models:
  QCOMMERCE_PLATFORM.GOLD.DAILY_DELIVERY_KPIS:
    ai_context:
      instructions: >
        Use this semantic model for questions about daily delivery kpis. Prefer its
        measures for aggregations and its dimensions for filtering, grouping, cohorting,
        and drill-downs.
      synonyms:
        - "daily delivery kpis"
        - "daily_delivery_kpis"
        - "daily"
        - "delivery"
      examples:
        - "Show daily delivery kpis trends over time."
        - "Break down daily delivery kpis by key dimensions."
    alias: daily_delivery_kpis

    dimensions:
      includes:
        - DS
        - CITY

    measures:
      TOTAL_ORDERS:
        ai_context:
          instructions: >
            Use this measure when the question asks for total orders. Respect its aggregation
            type before comparing or segmenting results.
          synonyms:
            - "total orders"
            - "total_orders"
            - "total"
            - "orders"
          examples:
            - "What is total orders by month?"
            - "Compare total orders across key dimensions."
        type: sum
        expression: "{daily_delivery_kpis.TOTAL_ORDERS}"

      DELIVERED_ORDERS:
        ai_context:
          instructions: >

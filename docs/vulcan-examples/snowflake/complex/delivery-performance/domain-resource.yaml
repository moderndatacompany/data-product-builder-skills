version: v1alpha
type: vulcan
name: pentest-dataproduct
tags:
  - quick-commerce
  - delivery-operations
  - logistics
spec:
  runAsUser: "anujsohanitmdcio"
  compute:  vapt-devops
  engine: snowflake
  repo:
    url: https://bitbucket.org/rubik_/vulcan-examples
    syncFlags:
      - '--ref=qa-deployment'
      - '--submodules=off'
    baseDir: vulcan-examples/snowflake/demo/delivery-performance
    secret: devops:vulcan-bitbucket-secret
  depots:
    - dataos://snowflakedepot?purpose=rw
  workflow:
    schedule:
      crons:
      - '*/15 * * * *'
      endOn: '2027-01-01T00:00:00-00:00'
      timezone: 'Asia/Kolkata'
      concurrencyPolicy: Forbid

    logLevel: INFO
    resource:
      request:
        cpu: "200m"
        memory: "512Mi"
      limit:
        cpu: "1000m"
        memory: "1Gi"
    plan:
      command:
        - vulcan
      arguments:
        - --log-to-stdout
        - plan
        - --auto-apply
    run:
      command:
        - vulcan
      arguments:
        - --log-to-stdout
        - run

  api:
    replicas: 2
    logLevel: INFO
    resource:
      request:
        cpu: "200m"
        memory: "512Mi"
      limit:
        cpu: "2000m"
        memory: "2Gi"

      aggregation type and any configured filters before comparing or segmenting
      results.
    synonyms:
      - "number of issues"
      - "number_of_issues"
      - "number"
      - "issues"
    examples:
      - "What is number of issues by month?"
      - "Compare number of issues across key segments."
  type: count
  expression: '{issue.ISSUE_UUID}'
  description: Total number of issue records.
  tags:
  - metric
  terms:
  - metric.number_of_issues

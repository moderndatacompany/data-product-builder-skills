kind: semantic
name: issue
depends_on: lenovo.ldo.issue
ai_context:
  instructions: >
    Use this semantic model for questions about issue. Prefer its measures for
    aggregations and its dimensions for filtering, grouping, cohorting, and
    drill-downs.
  synonyms:
    - "issue"
  examples:
    - "Show issue trends over time."
    - "Break down issue by key dimensions."


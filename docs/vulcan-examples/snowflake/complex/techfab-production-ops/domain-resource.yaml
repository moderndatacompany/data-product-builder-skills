version: v1alpha
type: vulcan
name: techfab-production-ops
tags:
  - production
  - manufacturing
  - oee
  - quality
  - performance
  - snowflake
  - techfab
  - operations
  - plant_analytics
  - equipment_effectiveness
spec:
  runAsUser: "shreyasikarwartmdcio"
  compute: demo-staging-compute
  engine: snowflake
  repo:
    url: https://bitbucket.org/rubik_/vulcan-examples
    syncFlags:
      - '--ref=main'
      - '--submodules=off'
    baseDir: vulcan-examples/demo/techfab-production-ops
    secret: demo-staging:git-sync
  depots:
    - dataos://mesplatform?purpose=rw
  workflow:
    type: schedule
    schedule:
      crons:
      - '0 0 * * *'  # Daily at midnight
      endOn: '2027-01-01T00:00:00-00:00'
      timezone: 'US/Pacific'
      concurrencyPolicy: Forbid

    logLevel: INFO
    resource:
      request:
        cpu: "200m"
        memory: "512Mi"
      limit:
        cpu: "1000m"
        memory: "1Gi"

    migrate:
      command:
        - vulcan
      arguments:
        - migrate
    plan:
      command:
        - vulcan
      arguments:
        - --log-to-stdout
        - plan
        - --auto-apply
    run:
      command:
        - vulcan
      arguments:
        - --log-to-stdout
        - run

  api:
    replicas: 5
    logLevel: INFO
    resource:
      request:
        cpu: "200m"
        memory: "512Mi"
      limit:
        cpu: "4000m"
        memory: "3Gi"


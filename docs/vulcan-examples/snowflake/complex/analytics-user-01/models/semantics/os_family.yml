# Converted from legacy: semantics/os_family.yml
kind: semantic
name: os_family
depends_on: LENOVO.USDK.OS_FAMILY
ai_context:
  instructions: >
    Use this semantic model for questions about os family. Prefer its measures for
    aggregations and its dimensions for filtering, grouping, cohorting, and
    drill-downs.
  synonyms:
    - "os family"
    - "os_family"
    - "family"
  examples:
    - "Show os family trends over time."
    - "Break down os family by key dimensions."

dimensions:
- OS_VERSION
- OS_FAMILY
measures:
- name: total_os_versions
  ai_context:
    instructions: >
      Use this measure when the question asks for total os versions. Respect its
      aggregation type and any configured filters before comparing or segmenting
      results.
    synonyms:
      - "total os versions"
      - "total_os_versions"
      - "total"
      - "versions"
    examples:
      - "What is total os versions by month?"
      - "Compare total os versions across key segments."
  type: count_distinct
  expression: '{os_family.OS_VERSION}'
  description: Total number of unique OS versions mapped
  tags:
  - metric
  terms:
  - metric.total_os_versions
- name: total_os_families
  ai_context:
    instructions: >
      Use this measure when the question asks for total os families. Respect its
      aggregation type and any configured filters before comparing or segmenting
      results.
    synonyms:
      - "total os families"
      - "total_os_families"
      - "total"
      - "families"
    examples:
      - "What is total os families by month?"
      - "Compare total os families across key segments."
  type: count_distinct
  expression: '{os_family.OS_FAMILY}'
  description: Total number of unique OS family names
  tags:
  - metric
  terms:
  - metric.total_os_families
segments:
- name: windows_11
  ai_context:
    instructions: >
      Apply this segment when the question asks for the windows 11 subset. Combine it
      with measures to answer filtered business questions.
    synonyms:
      - "windows 11"
      - "windows_11"
      - "windows"
    examples:
      - "Show revenue for windows 11."
      - "How many records are in windows 11?"
  expression: '{os_family.OS_FAMILY} LIKE ''Windows 11%'''
  description: Windows 11 versions only
  tags:
  - metric
  terms:
  - metric.windows_11

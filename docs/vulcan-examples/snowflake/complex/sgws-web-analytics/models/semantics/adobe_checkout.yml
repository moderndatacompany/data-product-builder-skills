kind: semantic
name: adobe_checkout
depends_on: web_analytics_gold.ADOBE_CHECKOUT
ai_context:
  instructions: >
    Use this semantic model for questions about adobe checkout. Prefer its measures
    for aggregations and its dimensions for filtering, grouping, cohorting, and
    drill-downs.
  synonyms:
    - "adobe checkout"
    - "adobe_checkout"
    - "adobe"
    - "checkout"
  examples:
    - "Show adobe checkout trends over time."
    - "Break down adobe checkout by key dimensions."

measures:
- name: total_revenues
  ai_context:
    instructions: >
      Use this measure when the question asks for total revenues. Respect its
      aggregation type and any configured filters before comparing or segmenting
      results.
    synonyms:
      - "total revenues"
      - "total_revenues"
      - "total"
      - "revenues"
    examples:
      - "What is total revenues by month?"
      - "Compare total revenues across key segments."
  type: number
  expression: SUM({adobe_checkout.REVENUE})
  description: Total revenue generated from the product.
  tags:
  - revenue
  - financial
  - metric
  terms:
  - revenue.total_revenues
  - finance.gross_sales
- name: total_revenues_from_list
  ai_context:
    instructions: >
      Use this measure when the question asks for total revenues from list. Respect its
      aggregation type and any configured filters before comparing or segmenting
      results.
    synonyms:
      - "total revenues from list"
      - "total_revenues_from_list"
      - "total"
      - "revenues"
    examples:
      - "What is total revenues from list by month?"
      - "Compare total revenues from list across key segments."
  type: number
  expression: SUM(CASE WHEN {adobe_checkout.LIST_TYPE} IS NOT NULL THEN {adobe_checkout.REVENUE} ELSE 0 END)
  description: Total revenue generated from list pages.
  tags:
  - revenue
  - financial
  - metric
  terms:
  - revenue.total_revenues_from_list
  - finance.gross_sales
- name: checkout_count
  ai_context:
    instructions: >
      Use this measure when the question asks for checkout count. Respect its
      aggregation type and any configured filters before comparing or segmenting

      - "Compare unique users across key segments."
  type: number
  expression: COUNT(DISTINCT {web_heartbeat.ADOBE_ECID})
  description: Total unique users visited the site.
  tags:
  - metric
  terms:
  - metric.unique_users
- name: last_30_account_sessions

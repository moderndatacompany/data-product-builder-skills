# Converted from legacy: semantics/web_heartbeat.yaml
kind: semantic
name: web_heartbeat
depends_on: web_analytics_gold.WEB_HEARTBEAT
ai_context:
  instructions: >
    Use this semantic model for questions about web heartbeat. Prefer its measures for
    aggregations and its dimensions for filtering, grouping, cohorting, and
    drill-downs.
  synonyms:
    - "web heartbeat"
    - "web_heartbeat"
    - "web"
    - "heartbeat"
  examples:
    - "Show web heartbeat trends over time."
    - "Break down web heartbeat by key dimensions."

measures:
- name: account_sessions
  ai_context:
    instructions: >
      Use this measure when the question asks for account sessions. Respect its
      aggregation type and any configured filters before comparing or segmenting
      results.
    synonyms:
      - "account sessions"
      - "account_sessions"
      - "account"
      - "sessions"
    examples:
      - "What is account sessions by month?"
      - "Compare account sessions across key segments."
  type: number
  expression: COUNT(DISTINCT {web_heartbeat.SESSIONID})
  description: Total number of sessions recorded. A session typically starts when a user lands on the site and ends after a period of inactivity or closing the site.
  tags:
  - metric
  terms:
  - metric.account_sessions
- name: authenticated_account_sessions
  ai_context:
    instructions: >
      Use this measure when the question asks for authenticated account sessions.
      Respect its aggregation type and any configured filters before comparing or
      segmenting results.
    synonyms:
      - "authenticated account sessions"
      - "authenticated_account_sessions"
      - "authenticated"
      - "account"
    examples:
      - "What is authenticated account sessions by month?"
      - "Compare authenticated account sessions across key segments."
  type: number
  expression: COUNT(DISTINCT CASE WHEN {web_heartbeat.ACCOUNT_UNIQUE_ID} IS NOT NULL OR {web_heartbeat.AUTHENTICATION_STATUS} = 'logged in' THEN {web_heartbeat.SESSIONID} END)
  description: Total number of sessions recorded from authenticated user.
  tags:
  - metric
  terms:
  - metric.authenticated_account_sessions
- name: unique_users

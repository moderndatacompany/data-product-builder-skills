  expression: CAST(COUNT(DISTINCT CASE WHEN {web_heartbeat.MAX_VISIT_PAGE_NUM_OF_SESSION} = {web_heartbeat.VISIT_PAGE_NUM} THEN {web_heartbeat.HITID} END) AS DECIMAL(15,5)) / NULLIF(COUNT(DISTINCT CASE

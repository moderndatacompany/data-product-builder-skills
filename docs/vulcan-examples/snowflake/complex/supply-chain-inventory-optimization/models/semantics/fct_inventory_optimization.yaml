models:
  ERP_PLATFORM.GOLD.FCT_INVENTORY_OPTIMIZATION:
    ai_context:
      instructions: >
        Use this semantic model for questions about fct inventory optimization. Prefer its
        measures for aggregations and its dimensions for filtering, grouping, cohorting,
        and drill-downs.
      synonyms:
        - "fct inventory optimization"
        - "fct_inventory_optimization"
        - "fct"
        - "inventory"
      examples:
        - "Show fct inventory optimization trends over time."
        - "Break down fct inventory optimization by key dimensions."
    alias: fct_inventory_optimization

    dimensions:
      includes:
        - inventory_opt_key
        - material_number
        - material_description
        - plant_code
        - abc_classification
        - excess_inventory_flag
        - primary_supplier_id
        - calculated_at

    measures:
      current_inventory_qty:
        ai_context:
          instructions: >
            Use this measure when the question asks for current inventory qty. Respect its
            aggregation type before comparing or segmenting results.
          synonyms:
            - "current inventory qty"
            - "current_inventory_qty"
            - "current"
            - "inventory"
          examples:
            - "What is current inventory qty by month?"
            - "Compare current inventory qty across key dimensions."
        type: sum
        expression: "{fct_inventory_optimization.current_inventory_qty}"

      current_inventory_value_usd:
        ai_context:
          instructions: >
            Use this measure when the question asks for current inventory value usd. Respect
            its aggregation type before comparing or segmenting results.
          synonyms:
            - "current inventory value usd"
            - "current_inventory_value_usd"
            - "current"
            - "inventory"
          examples:
            - "What is current inventory value usd by month?"
            - "Compare current inventory value usd across key dimensions."
        type: sum
        expression: "{fct_inventory_optimization.current_inventory_value_usd}"

      annual_usage_qty:

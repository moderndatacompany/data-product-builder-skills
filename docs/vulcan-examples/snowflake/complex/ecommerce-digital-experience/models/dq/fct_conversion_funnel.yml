# kind: dq — converted from checks/fct_conversion_funnel.yml
kind: dq
name: fct_conversion_funnel_dq
depends_on: ECOMMERCE_PLATFORM.GOLD.FCT_CONVERSION_FUNNEL

rules:
- row_count >= 10000:
    name: minimum_funnel_records
    dimension: completeness
    description: At least 10,000 session-level funnel records should exist

- missing_count(session_id) = 0:
    name: no_missing_session_id
    dimension: completeness
    description: All records must have a session_id

- missing_count(funnel_date) = 0:
    name: no_missing_funnel_date
    dimension: completeness
    description: All records must have a funnel_date

- missing_count(traffic_source) = 0:
    name: no_missing_traffic_source
    dimension: completeness
    description: All records must have a traffic_source

- invalid_count(has_cart) = 0:
    name: has_cart_valid_flag
    dimension: validity
    description: has_cart must be 0 or 1
    valid min: 0
    valid max: 1

- invalid_count(has_checkout) = 0:
    name: has_checkout_valid_flag
    dimension: validity
    description: has_checkout must be 0 or 1
    valid min: 0
    valid max: 1

- invalid_count(has_purchase) = 0:
    name: has_purchase_valid_flag
    dimension: validity
    description: has_purchase must be 0 or 1
    valid min: 0
    valid max: 1

- invalid_count(order_value_usd) = 0:
    name: order_value_non_negative
    dimension: validity
    description: Order value must be non-negative
    valid min: 0

- invalid_percent(device_type) < 1%:
    name: valid_device_types
    dimension: validity
    description: Device types must be Desktop, Mobile, or Tablet
    valid values: [Desktop, Mobile, Tablet]

- duplicate_count(session_id) = 0:
    name: unique_session_ids
    dimension: uniqueness
    description: Each session_id must be unique (one row per session)

- avg(has_purchase) > 0:
    name: some_purchases_exist
    dimension: accuracy
    description: At least some sessions should have purchases

- avg(order_value_usd) > 0:
    name: average_order_value_positive
    dimension: accuracy
    description: Average order value across all sessions should be positive

- failed rows:
    name: checkout_requires_cart
    dimension: accuracy
    description: Sessions with checkout should have added to cart first
    fail query: |
      SELECT session_id
      FROM ECOMMERCE_PLATFORM.GOLD.FCT_CONVERSION_FUNNEL
      WHERE has_checkout = 1 AND has_cart = 0
    samples limit: 10

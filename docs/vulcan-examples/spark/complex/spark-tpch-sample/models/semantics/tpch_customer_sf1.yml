      instructions: >
        Use this semantic model for questions about tpch customer sf1. Prefer its measures
        for aggregations and its dimensions for filtering, grouping, cohorting, and
        drill-downs.
      synonyms:
        - "tpch customer sf1"
        - "tpch_customer_sf1"
        - "tpch"
        - "customer"
      examples:
        - "Show tpch customer sf1 trends over time."
        - "Break down tpch customer sf1 by key dimensions."
    alias: tpch_customer_sf1

    dimensions:
      includes:
        - c_custkey
        - c_name
        - c_address
        - c_nationkey
        - c_phone
        - c_mktsegment

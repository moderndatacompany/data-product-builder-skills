    measures:
      c_acctbal:
        ai_context:
          instructions: >
            Use this measure when the question asks for c acctbal. Respect its aggregation
            type before comparing or segmenting results.
          synonyms:
            - "c acctbal"
            - "c_acctbal"
            - "acctbal"
          examples:
            - "What is c acctbal by month?"
            - "Compare c acctbal across key dimensions."
        type: sum
        expression: "{tpch_customer_sf1.c_acctbal}"
